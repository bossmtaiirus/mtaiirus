<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Mtaiirus — PW Batches</title>
  <link rel="icon" type="image/x-icon" href="https://i.ibb.co/G3TLgSgJ/pngtree-mv-vm-letter-vector-logo-image-332121.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #F5F2EB;
      --bg2: #ECEAE2;
      --ink: #1A1814;
      --ink2: #6B6760;
      --ink3: #B0ADA7;
      --accent: #D4540E;
      --accentl: #F0A87A;
      --accentb: rgba(212,84,14,.08);
      --green: #2D6A3F;
      --greenl: #E4F0E8;
      --blue: #1A4B8C;
      --bluel: #E4EBF7;
      --card: #FFFDFB;
      --border: rgba(26,24,20,.1);
      --borderh: rgba(26,24,20,.2);
      --danger: #D4540E;
      --success: #2D6A3F;
      --shadow: 0 16px 40px rgba(26,24,20,.10);
      --font-heading: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-body);
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      -webkit-tap-highlight-color: transparent;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    button, input { font: inherit; }
    button { cursor: pointer; border: none; }
    .hidden { display: none !important; }

    .app-header {
      position: sticky; top: 0; z-index: 50;
      background: rgba(245,242,235,.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }

    .nav {
      max-width: 1220px; margin: auto;
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px; gap: 12px;
    }
    .brand {
      display: flex; align-items: center; gap: 10px;
      font-family: var(--font-heading); font-weight: 800; font-size: 18px;
      color: var(--ink); letter-spacing: 1.2px; text-decoration: none;
    }
    .brand span { color: var(--accent); }
    .logo-img {
      width: 42px; height: 42px; border-radius: 12px;
      object-fit: cover; border: 1px solid var(--border);
    }

    .header-actions { display: flex; align-items: center; gap: 8px; }
    .icon-btn, .btn {
      border-radius: 10px; background: var(--card); color: var(--ink);
      border: 1px solid var(--border); min-height: 42px; padding: 0 14px;
      font-weight: 600; display: inline-flex; align-items: center;
      justify-content: center; gap: 8px;
      box-shadow: 0 4px 12px rgba(26,24,20,.04); transition: .2s;
      font-family: var(--font-body);
    }
    .icon-btn { width: 42px; padding: 0; }
    .btn:hover, .icon-btn:hover {
      transform: translateY(-1px);
      box-shadow: var(--shadow); border-color: var(--borderh);
    }
    .btn.primary { background: var(--ink); color: var(--bg); border-color: transparent; }
    .btn.primary:hover { background: var(--accent); }

    .logout-btn {
      background: var(--accentb); color: var(--accent);
      border: 1px solid rgba(212,84,14,.2); padding: 8px 16px;
      border-radius: 10px; font-family: var(--font-body); font-size: 13px;
      font-weight: 600; cursor: pointer; transition: all 0.2s;
    }
    .logout-btn:hover { background: var(--accent); color: #fff; }

    .tabs-container {
      display: flex; gap: 8px; margin-bottom: 20px;
      background: var(--bg2); padding: 6px; border-radius: 14px; width: fit-content;
    }
    .tab-btn {
      padding: 10px 24px; border-radius: 10px; font-weight: 700;
      color: var(--ink2); background: transparent; transition: .2s; font-family: var(--font-body);
    }
    .tab-btn.active { background: var(--card); color: var(--ink); box-shadow: 0 2px 8px rgba(26,24,20,.08); }

    main { max-width: 1220px; margin: auto; padding: 22px 16px 42px; }

    .stats-section {
      background: var(--card); border-radius: 14px; padding: 16px 24px;
      margin-bottom: 24px; display: flex; justify-content: space-between;
      align-items: center; box-shadow: 0 2px 8px rgba(26,24,20,.04);
      border: 1px solid var(--border); flex-wrap: wrap; gap: 16px;
    }
    .stats-container { display: flex; gap: 24px; flex-wrap: wrap; }
    .stat-box { display: flex; align-items: center; gap: 12px; }
    .stat-icon {
      font-size: 20px; width: 44px; height: 44px; display: grid; place-items: center;
      border-radius: 12px; background: var(--accentb); color: var(--accent);
    }
    .stat-info { display: flex; flex-direction: column; }
    .stat-label { font-size: 11px; color: var(--ink3); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-value { font-family: var(--font-heading); font-size: 22px; font-weight: 800; color: var(--ink); line-height: 1.1; }
    .showing-text { color: var(--ink2); font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 6px; }

    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 22px; }
    .card {
      background: var(--card); border: 1px solid var(--border); border-radius: 16px;
      overflow: hidden; box-shadow: 0 4px 16px rgba(26,24,20,.06);
      transition: .22s; display: flex; flex-direction: column;
    }
    .card:hover { transform: translateY(-3px); box-shadow: var(--shadow); border-color: var(--borderh); }
    .thumb { position: relative; aspect-ratio: 16/9; background: var(--bg2); overflow: hidden; }
    .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .badge {
      position: absolute; border-radius: 999px; padding: 5px 10px;
      color: #fff; font-size: 11px; font-weight: 700; letter-spacing: .3px;
    }
    .badge.right { top: 10px; right: 10px; background: var(--green); }
    .badge.left { top: 10px; left: 10px; background: var(--accent); }
    .card-body { padding: 14px; display: flex; flex-direction: column; gap: 12px; flex: 1; }
    .course-title { font-family: var(--font-heading); font-size: 15px; line-height: 1.35; font-weight: 700; color: var(--ink); }
    .card-actions { margin-top: auto; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .footer-note { text-align: center; margin-top: 28px; color: var(--ink3); font-size: 13px; }

    .loading-overlay {
      position: fixed; inset: 0; background: var(--bg); display: flex;
      flex-direction: column; align-items: center; justify-content: center;
      z-index: 9999; gap: 16px;
    }
    .loading-spinner { width: 44px; height: 44px; border: 4px solid var(--bg2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-family: var(--font-heading); font-size: 14px; color: var(--ink2); font-weight: 600; }

    @media (max-width: 900px) { .grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 620px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
    <p class="loading-text">Verifying access...</p>
  </div>

  <header class="app-header">
    <div class="nav">
      <a href="/" class="brand">
        <img src="https://i.ibb.co/G3TLgSgJ/pngtree-mv-vm-letter-vector-logo-image-332121.jpg" class="logo-img" alt="Mtaiirus">
        MTAI<span>IRUS</span>
      </a>
      <div class="header-actions">
        <button class="logout-btn" onclick="handleLogout()">Logout</button>
      </div>
    </div>
  </header>

  <main>
    <div class="tabs-container">
      <button class="tab-btn active" id="tabAll">All Batches</button>
      <button class="tab-btn" id="tabEnrolled">Enrolled Batches</button>
    </div>

    <section class="stats-section">
      <div class="stats-container">
        <div class="stat-box"><div class="stat-icon">📚</div><div class="stat-info"><span class="stat-label">Total Batches</span><span class="stat-value" id="totalBatchesCount">0</span></div></div>
        <div class="stat-box"><div class="stat-icon">🎛️</div><div class="stat-info"><span class="stat-label">Filtered Batches</span><span class="stat-value" id="filteredBatchesCount">0</span></div></div>
      </div>
      <div class="showing-text">👁️ Showing <span id="showingCount" style="color:var(--ink);font-weight:700;">0</span> of <span id="totalFilteredCount" style="color:var(--ink);font-weight:700;">0</span></div>
    </section>

    <section id="statusArea"></section>
    <section class="grid" id="batchGrid"></section>
    <p class="footer-note">© 2025 Mtaiirus · Made with ♥ for Students of India</p>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <script>
    // ═══════════ CONFIG ═══════════
    const LOGIN_PAGE = '../login.html';
    const supabaseClient = supabase.createClient(
      "https://meatemqrhqthgpxwstrl.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1lYXRlbXFyaHF0aGdweHdzdHJsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5OTc5NjEsImV4cCI6MjA5NjU3Mzk2MX0.Qnx5wU6o0OvBFrWlq3jjt3kN2sa20nhEv4zGZbQu_pw"
    );

    // ═══════════ AUTH CHECK ═══════════
    async function checkAuth() {
      try {
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (!session?.user) {
          sessionStorage.setItem('mtaiirus_redirect', window.location.href);
          window.location.href = LOGIN_PAGE;
          return false;
        }
        document.getElementById('loadingOverlay').style.display = 'none';
        return true;
      } catch(e) {
        console.error('Auth check failed:', e);
        return false;
      }
    }

    function handleLogout() {
      supabaseClient.auth.signOut();
      localStorage.removeItem('mtaiirus_logged_in');
      window.location.href = LOGIN_PAGE;
    }

    // ═══════════ SECURITY ═══════════
    (function() {
      var R='kehamhai.html',f=false,t=160;
      function rd(){if(f)return;f=true;location.replace(R)}
      setInterval(function(){var w=outerWidth-innerWidth,h=outerHeight-innerHeight;if(w>t||h>t)rd()},600);
      setInterval(function(){(function(){var d=new Date();debugger;if(new Date()-d>100)rd()})()},3000);
      document.addEventListener('contextmenu',function(e){e.preventDefault();e.stopPropagation();return false},true);
      ['selectstart','dragstart','copy','cut'].forEach(function(e){document.addEventListener(e,function(ev){ev.preventDefault();return false})});
      document.addEventListener('keydown',function(e){var k=e.key||'';if(e.keyCode===123||k==='F12'){e.preventDefault();e.stopPropagation();return false}if((e.ctrlKey||e.metaKey)&&e.shiftKey&&['I','J','C'].includes(k.toUpperCase())){e.preventDefault();e.stopPropagation();return false}if((e.ctrlKey||e.metaKey)&&['u','s','p','a'].includes(k.toLowerCase())){e.preventDefault();e.stopPropagation();return false}},true);
      try{var n=function(){};['log','warn','error','info','debug'].forEach(function(m){if(console[m])console[m]=n})}catch(_){}
      document.documentElement.style.setProperty('-webkit-user-select','none');
      document.documentElement.style.setProperty('-moz-user-select','none');
      document.documentElement.style.setProperty('-ms-user-select','none');
      document.documentElement.style.setProperty('user-select','none');
    })();

    // ═══════════ INIT ═══════════
    (async function() {
      const ok = await checkAuth();
      if (!ok) return;
      
      // Load pbatch.js AFTER auth is confirmed
      var s = document.createElement('script');
      s.src = '../apv/pbatch.js';
      s.onload = function() { console.log('✅ pbatch.js loaded successfully'); };
      s.onerror = function() { console.error('❌ Failed to load pbatch.js from ../apv/pbatch.js'); };
      document.body.appendChild(s);
    })();
  </script>
</body>
</html>
