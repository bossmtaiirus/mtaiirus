
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#D4540E">
  <title>Mtaiirus — Test Instructions</title>
  <link rel="icon" type="image/png" href="https://i.ibb.co/G3TLgSgJ/pngtree-mv-vm-letter-vector-logo-image-332121.jpg">
  <link rel="apple-touch-icon" href="https://i.ibb.co/G3TLgSgJ/pngtree-mv-vm-letter-vector-logo-image-332121.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800;900&family=DM+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #F5F2EB;
      --panel: #FFFDFB;
      --panel-soft: #F5F2EB;
      --text: #1A1814;
      --muted: #6B6760;
      --muted2: #B0ADA7;
      --line: rgba(26,24,20,.1);
      --accent: #D4540E;
      --accent-soft: rgba(212,84,14,.08);
      --danger: #D4540E;
      --success: #2D6A3F;
      --review: #e8651f;
      --shadow: 0 12px 30px rgba(26,24,20,.08);
      --font-heading: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      -webkit-tap-highlight-color: transparent;
      -webkit-text-size-adjust: 100%;
    }

    button, select, input { font: inherit; }
    img { display: block; max-width: 100%; }

    .app {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--panel);
    }

    .topbar {
      min-height: 58px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 24px;
      border-bottom: 1px solid var(--line);
      box-shadow: 0 2px 12px rgba(26,24,20,.04);
      flex-shrink: 0;
      background: rgba(245,242,235,.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .logo {
      height: 34px;
      width: auto;
      border-radius: 8px;
      object-fit: contain;
      border: 1px solid var(--line);
    }

    .brand-name {
      font-family: var(--font-heading);
      font-size: 1rem;
      font-weight: 800;
      color: var(--text);
      letter-spacing: 1px;
    }
    .brand-name span { color: var(--accent); }

    .test-name {
      font-family: var(--font-heading);
      font-weight: 700;
      color: var(--text);
      line-height: 1.3;
      letter-spacing: -.2px;
    }

    .main {
      flex: 1;
      overflow-y: auto;
      padding: 28px clamp(18px, 4vw, 40px);
    }

    .content { max-width: 1080px; }
    .section { margin-bottom: 28px; }

    h1, h2 {
      margin: 0 0 16px;
      font-family: var(--font-heading);
      color: var(--text);
      letter-spacing: -.3px;
    }

    h1 { font-size: 18px; }
    h2 { font-size: 20px; }

    p {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.75;
    }

    .legend {
      display: grid;
      gap: 12px;
      padding-left: 4px;
      margin: 12px 0 18px;
    }

    .legend-row {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--muted);
      font-size: 14px;
    }

    .status {
      width: 22px;
      height: 22px;
      border-radius: 6px;
      border: 1px solid transparent;
      box-shadow: 0 1px 4px rgba(26,24,20,.08);
      flex-shrink: 0;
      position: relative;
    }

    .status.not-visited { background: #fff; border-color: var(--muted2); }
    .status.not-answered { background: var(--danger); }
    .status.answered { background: var(--success); }
    .status.review { background: var(--review); }
    .status.review-dot::after {
      content: "";
      position: absolute;
      right: -2px;
      bottom: -2px;
      width: 8px;
      height: 8px;
      background: #fff;
      border: 1px solid var(--muted2);
      border-radius: 50%;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      padding: 12px clamp(18px, 4vw, 40px);
      border-top: 1px solid var(--line);
      flex-shrink: 0;
      background: var(--panel);
    }

    .btn {
      border: 0;
      border-radius: 10px;
      min-height: 44px;
      padding: 0 30px;
      font-weight: 600;
      cursor: pointer;
      transition: .18s ease;
      font-family: var(--font-body);
    }

    .btn:hover { transform: translateY(-1px); }
    .btn-primary { background: var(--text); color: var(--bg); }
    .btn-primary:hover { background: var(--accent); color: #fff; }
    .btn-soft { background: var(--accent-soft); color: var(--accent); }
    .btn-soft:hover { background: var(--accent); color: #fff; }
    .btn:disabled {
      background: var(--muted2);
      color: #fff;
      cursor: not-allowed;
      transform: none;
    }

    .panel {
      background: var(--panel-soft);
      border-top: 1px solid var(--line);
      padding: 24px clamp(18px, 4vw, 40px);
    }

    .control-row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .control-row label,
    .control-row span {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }

    select {
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 12px;
      background: var(--panel);
      color: var(--text);
      outline: none;
      font-family: var(--font-body);
    }

    select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(212,84,14,.1);
    }

    .note {
      color: var(--accent);
      font-size: 12px;
      font-style: italic;
      margin-bottom: 16px;
    }

    .decl {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      max-width: 980px;
    }

    .decl input {
      width: 17px;
      height: 17px;
      margin-top: 3px;
      flex-shrink: 0;
      accent-color: var(--accent);
    }

    .decl label {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
      cursor: pointer;
    }

    .instructions-html {
      color: var(--muted);
      line-height: 1.7;
      font-size: 14px;
    }

    .instructions-html :is(p, li) { line-height: 1.7; }
    .instructions-html img { border-radius: 10px; margin: 12px 0; }

    .loading { background: var(--panel); }

    .skeleton-top {
      height: 32px;
      width: 160px;
      border-radius: 8px;
      background: var(--bg);
      animation: pulse 1s infinite alternate;
    }

    .skeleton {
      height: 16px;
      border-radius: 999px;
      background: var(--bg);
      margin-bottom: 14px;
      animation: pulse 1s infinite alternate;
    }

    .error {
      max-width: 680px;
      margin: 80px auto;
      text-align: center;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 28px;
      box-shadow: var(--shadow);
    }

    .error h2 { font-family: var(--font-heading); margin-bottom: 8px; }

    @keyframes pulse {
      from { opacity: .55; }
      to { opacity: 1; }
    }

    @media (max-width: 640px) {
      .topbar { padding: 12px 16px; }
      .main { padding: 20px 16px; }
      .footer { padding: 12px 16px; flex-direction: column-reverse; align-items: stretch; }
      .btn { width: 100%; }
      .panel { padding: 20px 16px; }
    }
  </style>
</head>
<body>
  <div id="app" class="app loading">
    <header class="topbar">
      <div class="skeleton-top"></div>
    </header>
    <main class="main">
      <div class="content">
        <div class="skeleton" style="width:28%;"></div>
        <div class="skeleton" style="width:100%;"></div>
        <div class="skeleton" style="width:96%;"></div>
        <div class="skeleton" style="width:72%;"></div>
      </div>
    </main>
  </div>

</html>
