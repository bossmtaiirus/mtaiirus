<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduBatches Video Player</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: #000;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }

  .player-container {
    width: 100vw;
    height: 100vh;
    position: relative;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  video {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  .controls {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
    padding: 20px;
    transition: opacity 0.3s ease;
    z-index: 10;
  }

  .player-container.hide-controls .controls {
    opacity: 0;
    pointer-events: none;
  }

  .progress-bar {
    width: 100%;
    height: 4px;
    background: rgba(255,255,255,0.2);
    border-radius: 2px;
    cursor: pointer;
    margin-bottom: 15px;
    position: relative;
  }

  .progress-fill {
    width: 0%;
    height: 100%;
    background: #5a4bda;
    border-radius: 2px;
    position: relative;
  }

  .progress-fill::after {
    content: '';
    position: absolute;
    right: -6px;
    top: 50%;
    transform: translateY(-50%);
    width: 12px;
    height: 12px;
    background: #5a4bda;
    border-radius: 50%;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .progress-bar:hover .progress-fill::after {
    opacity: 1;
  }

  .controls-row {
    display: flex;
    align-items: center;
    gap: 15px;
    flex-wrap: wrap;
  }

  button {
    background: none;
    border: none;
    cursor: pointer;
    color: white;
    padding: 8px;
    border-radius: 8px;
    transition: background 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  button:hover {
    background: rgba(255,255,255,0.1);
  }

  button svg {
    width: 20px;
    height: 20px;
    fill: white;
  }

  .time-display {
    font-size: 13px;
    color: white;
    font-family: monospace;
  }

  input[type="range"] {
    width: 80px;
    height: 4px;
    -webkit-appearance: none;
    background: rgba(255,255,255,0.2);
    border-radius: 2px;
    outline: none;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px;
    height: 12px;
    background: white;
    border-radius: 50%;
    cursor: pointer;
  }

  select {
    background: rgba(0,0,0,0.7);
    color: white;
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 12px;
    cursor: pointer;
  }

  .video-title {
    position: absolute;
    top: 20px;
    left: 20px;
    right: 80px;
    color: white;
    font-size: 14px;
    font-weight: 600;
    background: rgba(0,0,0,0.5);
    padding: 8px 16px;
    border-radius: 20px;
    z-index: 10;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    pointer-events: none;
  }

  .close-btn {
    position: absolute;
    top: 20px;
    right: 20px;
    background: rgba(0,0,0,0.5);
    border-radius: 50%;
    width: 40px;
    height: 40px;
    padding: 0;
    z-index: 10;
    font-size: 20px;
  }

  .error-message {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.9);
    color: white;
    padding: 20px 30px;
    border-radius: 12px;
    text-align: center;
    z-index: 20;
    display: none;
    flex-direction: column;
    gap: 15px;
    min-width: 280px;
  }

  .error-message.active {
    display: flex;
  }

  .error-message button {
    background: #5a4bda;
    padding: 10px 20px;
    justify-content: center;
  }

  .loading {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: white;
    font-size: 14px;
    background: rgba(0,0,0,0.7);
    padding: 10px 20px;
    border-radius: 20px;
    z-index: 15;
    display: none;
  }

  .loading.active {
    display: block;
  }

  .no-video {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    color: white;
    z-index: 15;
    display: none;
    flex-direction: column;
    gap: 20px;
    align-items: center;
  }

  .no-video.active {
    display: flex;
  }

  .no-video svg {
    width: 80px;
    height: 80px;
    opacity: 0.5;
  }

  .no-video h2 {
    font-size: 20px;
    font-weight: 500;
  }

  .no-video p {
    opacity: 0.7;
    font-size: 14px;
  }

  @media (max-width: 640px) {
    .controls-row {
      gap: 8px;
    }
    button svg {
      width: 16px;
      height: 16px;
    }
    .time-display {
      font-size: 11px;
    }
    input[type="range"] {
      width: 60px;
    }
    .video-title {
      font-size: 11px;
      top: 12px;
      left: 12px;
      right: 60px;
    }
  }
</style>
</head>
<body>

<div class="player-container" id="player-container">
  <div class="video-title" id="video-title">No Lecture Selected</div>
  <button class="close-btn" onclick="closePlayer()">✕</button>
  
  <video id="video" controlslist="nodownload"></video>
  
  <div class="loading" id="loading">
    <span>Loading video...</span>
  </div>
  
  <div class="no-video" id="no-video">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <rect x="2" y="4" width="20" height="16" rx="2"/>
      <path d="M9 8l6 4-6 4V8z"/>
    </svg>
    <h2>No Lecture Selected</h2>
    <p>Please select a lecture from the EduBatches platform</p>
  </div>
  
  <div class="error-message" id="error-message">
    <span>⚠️ Unable to play this video</span>
    <button onclick="retryVideo()">Retry</button>
    <button onclick="openInBrowser()">Open in Browser</button>
  </div>
  
  <div class="controls">
    <div class="progress-bar" id="progress-bar">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
    <div class="controls-row">
      <button id="play-pause" onclick="togglePlay()">
        <svg id="play-icon" viewBox="0 0 24 24">
          <path d="M8 5v14l11-7z"/>
        </svg>
      </button>
      <button onclick="skip(-10)">
        <svg viewBox="0 0 24 24">
          <path d="M11 18V6l-8 6 8 6zm1-6 8-6v12l-8-6z"/>
        </svg>
      </button>
      <button onclick="skip(10)">
        <svg viewBox="0 0 24 24">
          <path d="M13 6v12l8-6-8-6zm-1 0L4 12l8 6V6z"/>
        </svg>
      </button>
      <span class="time-display" id="time-display">0:00 / 0:00</span>
      <input type="range" id="volume" min="0" max="1" step="0.01" value="1">
      <select id="speed">
        <option value="0.5">0.5x</option>
        <option value="0.75">0.75x</option>
        <option value="1" selected>1x</option>
        <option value="1.25">1.25x</option>
        <option value="1.5">1.5x</option>
        <option value="2">2x</option>
      </select>
    </div>
  </div>
</div>

<script>
  // DOM Elements
  const video = document.getElementById('video');
  const container = document.getElementById('player-container');
  const progressBar = document.getElementById('progress-bar');
  const progressFill = document.getElementById('progress-fill');
  const timeDisplay = document.getElementById('time-display');
  const volumeSlider = document.getElementById('volume');
  const speedSelect = document.getElementById('speed');
  const playIcon = document.getElementById('play-icon');
  const videoTitle = document.getElementById('video-title');
  const loadingDiv = document.getElementById('loading');
  const errorDiv = document.getElementById('error-message');
  const noVideoDiv = document.getElementById('no-video');
  
  let currentVideoUrl = null;
  let controlsTimeout = null;
  
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  // GET URL PARAMETERS
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  function getUrlParams() {
    const params = new URLSearchParams(window.location.search);
    return {
      url: params.get('url'),
      title: params.get('title')
    };
  }
  
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  // PLAYER FUNCTIONS
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  
  function loadVideo(url, title) {
    if (!url) {
      noVideoDiv.classList.add('active');
      loadingDiv.classList.remove('active');
      errorDiv.classList.remove('active');
      videoTitle.textContent = 'No Lecture Selected';
      return false;
    }
    
    currentVideoUrl = url;
    videoTitle.textContent = title || 'Lecture Video';
    noVideoDiv.classList.remove('active');
    errorDiv.classList.remove('active');
    loadingDiv.classList.add('active');
    
    // Clear previous source
    video.src = '';
    video.load();
    
    // Set new source
    video.src = url;
    video.load();
    
    // Try to play
    const playPromise = video.play();
    if (playPromise !== undefined) {
      playPromise.then(() => {
        loadingDiv.classList.remove('active');
      }).catch(error => {
        loadingDiv.classList.remove('active');
        errorDiv.classList.add('active');
        console.error('Playback error:', error);
      });
    }
    
    return true;
  }
  
  function togglePlay() {
    if (video.paused) {
      video.play();
    } else {
      video.pause();
    }
  }
  
  function skip(seconds) {
    video.currentTime = Math.min(Math.max(video.currentTime + seconds, 0), video.duration);
  }
  
  function formatTime(seconds) {
    if (isNaN(seconds) || !isFinite(seconds)) return '0:00';
    const hrs = Math.floor(seconds / 3600);
    const mins = Math.floor((seconds % 3600) / 60);
    const secs = Math.floor(seconds % 60);
    if (hrs > 0) {
      return `${hrs}:${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
    }
    return `${mins}:${secs.toString().padStart(2,'0')}`;
  }
  
  function retryVideo() {
    if (currentVideoUrl) {
      loadVideo(currentVideoUrl, videoTitle.textContent);
    }
  }
  
  function openInBrowser() {
    if (currentVideoUrl) {
      window.open(currentVideoUrl, '_blank');
    }
  }
  
  function closePlayer() {
    window.close();
  }
  
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  // EVENT LISTENERS
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  
  video.addEventListener('timeupdate', () => {
    if (video.duration) {
      const percent = (video.currentTime / video.duration) * 100;
      progressFill.style.width = percent + '%';
      timeDisplay.textContent = formatTime(video.currentTime) + ' / ' + formatTime(video.duration);
    }
  });
  
  video.addEventListener('play', () => {
    playIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
  });
  
  video.addEventListener('pause', () => {
    playIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
  });
  
  video.addEventListener('error', (e) => {
    loadingDiv.classList.remove('active');
    errorDiv.classList.add('active');
    console.error('Video error:', e);
  });
  
  video.addEventListener('canplay', () => {
    loadingDiv.classList.remove('active');
  });
  
  // Progress bar seeking
  progressBar.addEventListener('click', (e) => {
    const rect = progressBar.getBoundingClientRect();
    const percent = (e.clientX - rect.left) / rect.width;
    if (video.duration) {
      video.currentTime = percent * video.duration;
    }
  });
  
  // Volume control
  volumeSlider.addEventListener('input', () => {
    video.volume = volumeSlider.value;
    localStorage.setItem('playerVolume', volumeSlider.value);
  });
  
  // Speed control
  speedSelect.addEventListener('change', () => {
    video.playbackRate = parseFloat(speedSelect.value);
    localStorage.setItem('playerSpeed', speedSelect.value);
  });
  
  // Auto-hide controls
  container.addEventListener('mousemove', () => {
    container.classList.remove('hide-controls');
    clearTimeout(controlsTimeout);
    controlsTimeout = setTimeout(() => {
      if (!video.paused) {
        container.classList.add('hide-controls');
      }
    }, 2000);
  });
  
  container.addEventListener('mouseleave', () => {
    if (!video.paused) {
      container.classList.add('hide-controls');
    }
  });
  
  // Load saved preferences
  const savedVolume = localStorage.getItem('playerVolume');
  if (savedVolume !== null) {
    video.volume = parseFloat(savedVolume);
    volumeSlider.value = savedVolume;
  }
  
  const savedSpeed = localStorage.getItem('playerSpeed');
  if (savedSpeed !== null) {
    video.playbackRate = parseFloat(savedSpeed);
    speedSelect.value = savedSpeed;
  }
  
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  // INITIALIZE
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  function init() {
    const params = getUrlParams();
    
    if (params.url) {
      // Decode URL and title
      const decodedUrl = decodeURIComponent(params.url);
      const decodedTitle = params.title ? decodeURIComponent(params.title) : 'Lecture Video';
      loadVideo(decodedUrl, decodedTitle);
    } else {
      // No video URL - show "No lecture selected" message
      noVideoDiv.classList.add('active');
      videoTitle.textContent = 'No Lecture Selected';
    }
  }
  
  // Start the player
  init();
</script>
</body>
</html>
