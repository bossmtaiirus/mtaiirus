
<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="robots" content="noindex, follow">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Mtaiirus — Courses</title>
  <link rel="icon" type="image/x-icon" href="https://i.ibb.co/G3TLgSgJ/pngtree-mv-vm-letter-vector-logo-image-332121.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg: #F5F2EB;
      --bg-soft: #ECEAE2;
      --panel: #FFFDFB;
      --panel-2: #F5F2EB;
      --card: #FFFDFB;
      --text: #1A1814;
      --muted: #6B6760;
      --line: rgba(26,24,20,.08);
      --accent: #D4540E;
      --accent-2: #e8651f;
      --success: #2D6A3F;
      --danger: #D4540E;
      --warning: #f59e0b;
      --shadow: 0 18px 48px rgba(26,24,20,.1);
      --chip: rgba(212,84,14,.06);
      --font-heading: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }

    body.light {
      --bg: #F5F2EB;
      --bg-soft: #ECEAE2;
      --panel: #FFFDFB;
      --panel-2: #F5F2EB;
      --card: #FFFDFB;
      --text: #1A1814;
      --muted: #6B6760;
      --line: rgba(26,24,20,.10);
      --accent: #D4540E;
      --accent-2: #e8651f;
      --success: #2D6A3F;
      --danger: #D4540E;
      --warning: #d97706;
      --shadow: 0 16px 40px rgba(26,24,20,.08);
      --chip: rgba(212,84,14,.06);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: var(--font-body);
      background:
        radial-gradient(circle at top left, rgba(212,84,14,.1), transparent 25%),
        radial-gradient(circle at top right, rgba(240,168,122,.08), transparent 22%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg-soft) 100%);
      color: var(--text);
      min-height: 100vh;
      transition: background .25s ease, color .25s ease;
      -webkit-tap-highlight-color: transparent;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }
    a { color: inherit; text-decoration: none; }
    button, input { font: inherit; }
    img { display: block; max-width: 100%; }

    .container {
      width: min(1240px, calc(100% - 28px));
      margin: 0 auto;
    }
    .price-box {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .price {
      font-family: var(--font-heading);
      font-size: 18px;
      font-weight: 800;
      color: var(--text);
    }
    .mrp {
      font-size: 14px;
      color: var(--muted);
      text-decoration: line-through;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      background: rgba(245,242,235,.88);
      border-bottom: 1px solid var(--line);
    }
    .topbar-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 16px 0;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
    }
    .brand-logo {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      object-fit: contain;
      border: 1px solid var(--line);
      background: #fff;
    }
    .brand-name {
      font-family: var(--font-heading);
      font-size: 1.2rem;
      font-weight: 800;
      color: var(--text);
      letter-spacing: 1.2px;
    }
    .brand-name span { color: var(--accent); }

    .actions {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
      justify-content: flex-end;
    }
    .search-wrap {
      position: relative;
      width: min(360px, 100%);
    }
    .search {
      width: 100%;
      height: 46px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: var(--chip);
      color: var(--text);
      padding: 0 16px 0 44px;
      outline: none;
      font-family: var(--font-body);
    }
    .search:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(212,84,14,.1);
    }
    .search::placeholder { color: var(--muted); }
    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 15px;
      pointer-events: none;
    }
    .theme-btn {
      height: 46px;
      padding: 0 14px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: var(--chip);
      color: var(--text);
      cursor: pointer;
      font-weight: 600;
      font-family: var(--font-body);
    }

    .search-results {
      position: absolute;
      top: calc(100% + 10px);
      left: 0;
      right: 0;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: var(--shadow);
      overflow: hidden;
      display: none;
    }
    .search-results.show { display: block; }
    .result-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      cursor: pointer;
      border-bottom: 1px solid var(--line);
      transition: background .2s ease;
    }
    .result-item:last-child { border-bottom: 0; }
    .result-item:hover { background: var(--chip); }
    .result-item img {
      width: 58px;
      height: 40px;
      object-fit: cover;
      border-radius: 10px;
      flex-shrink: 0;
    }
    .result-title {
      font-family: var(--font-heading);
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.35;
    }

    .page { padding: 24px 0 40px; }
    .stack { display: grid; gap: 22px; }

    .slider {
      position: relative;
      overflow: hidden;
      border-radius: 24px;
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }
    .slides {
      display: flex;
      transition: transform .5s ease;
    }
    .slide {
      min-width: 100%;
      background: var(--panel);
    }
    .slide img {
      width: 100%;
      height: auto;
      object-fit: cover;
      display: block;
    }
    .dots {
      position: absolute;
      left: 50%;
      bottom: 14px;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      background: rgba(26,24,20,.24);
      padding: 8px 10px;
      border-radius: 999px;
      backdrop-filter: blur(8px);
    }
    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: rgba(245,242,235,.45);
      cursor: pointer;
    }
    .dot.active { background: #F0A87A; }

    .info-box {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 18px 20px;
      border-radius: 20px;
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      background: var(--panel);
    }
    .info-box.teal {
      background: linear-gradient(135deg, rgba(45,106,63,.08), var(--panel));
    }
    .info-box.red {
      background: linear-gradient(135deg, rgba(212,84,14,.08), var(--panel));
    }
    .info-left {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }
    .info-left img, .info-icon {
      width: 62px;
      height: 62px;
      object-fit: contain;
      flex-shrink: 0;
    }
    .info-text h3 {
      margin: 0 0 6px;
      font-family: var(--font-heading);
      font-size: 18px;
      font-weight: 700;
    }
    .info-text p {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
    }

    .btn {
      border: none;
      cursor: pointer;
      border-radius: 12px;
      font-weight: 600;
      font-family: var(--font-body);
      transition: transform .2s ease, background .2s ease;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn-primary {
      background: var(--text);
      color: var(--bg);
      padding: 12px 16px;
      box-shadow: 0 8px 20px rgba(212,84,14,.2);
    }
    .btn-primary:hover {
      background: var(--accent);
      color: #fff;
    }
    .btn-danger {
      background: var(--accent);
      color: white;
      padding: 12px 16px;
    }
    .btn-danger:hover { background: #bf4a0c; }
    .btn-ghost {
      background: var(--chip);
      color: var(--text);
      border: 1px solid var(--line);
      padding: 12px 16px;
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: var(--font-heading);
      font-size: 24px;
      font-weight: 800;
      margin: 0 0 16px;
      letter-spacing: -.3px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 18px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(26,24,20,.06);
      transition: transform .22s ease, box-shadow .22s ease;
      display: flex;
      flex-direction: column;
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow);
      border-color: rgba(26,24,20,.15);
    }
    .card-media {
      position: relative;
      padding: 14px 14px 0;
    }
    .card-media img {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      border-radius: 14px;
    }
    .badge {
      position: absolute;
      top: 20px;
      left: 20px;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      color: white;
      background: linear-gradient(135deg, #D4540E, #e8651f);
      box-shadow: 0 4px 16px rgba(212,84,14,.2);
      letter-spacing: .3px;
    }
    .card-body {
      padding: 16px;
      display: flex;
      flex-direction: column;
      flex: 1;
    }
    .card-title {
      font-family: var(--font-heading);
      font-size: 15px;
      font-weight: 700;
      line-height: 1.45;
      margin-bottom: 12px;
      min-height: 44px;
      letter-spacing: -.2px;
    }
    .meta {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 14px;
    }
    .card-actions {
      margin-top: auto;
      display: flex;
      gap: 10px;
    }
    .card-actions .btn { flex: 1; }

    footer {
      margin-top: 42px;
      padding: 28px 0;
      border-top: 1px solid var(--line);
      background: var(--bg-soft);
    }
    .footer-inner {
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .footer-inner img { height: 48px; cursor: pointer; border-radius: 12px; }
    .footer-text {
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      margin-top: 12px;
    }

    @media (max-width: 1100px) {
      .grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    }
    @media (max-width: 860px) {
      .topbar-inner, .actions { flex-direction: column; align-items: stretch; }
      .search-wrap { width: 100%; }
      .info-box { flex-direction: column; align-items: stretch; }
      .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 560px) {
      .grid { grid-template-columns: 1fr; }
      .card-actions { flex-direction: column; }
      .info-left { align-items: flex-start; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="container topbar-inner">
      <div class="brand" onclick="goHome()">
        <img class="brand-logo" src="https://i.ibb.co/G3TLgSgJ/pngtree-mv-vm-letter-vector-logo-image-332121.jpg" alt="Mtaiirus" onerror="this.style.display='none'">
        <span class="brand-name">MTAI<span>IRUS</span></span>
      </div>

      <div class="actions">
        <div class="search-wrap" id="searchWrap">
          <span class="search-icon">⌕</span>
          <input id="searchInput" class="search" type="search" placeholder="What are you looking for...">
          <div id="searchResults" class="search-results"></div>
        </div>
        <button class="theme-btn" id="themeBtn">Toggle Theme</button>
      </div>
    </div>
  </header>

  <main class="page">
    <div class="container stack">
      <section class="slider" id="slider">
        <div class="slides" id="slides"></div>
        <div class="dots" id="dots"></div>
      </section>

      <section class="info-box teal">
        <div class="info-left">
          <img src="https://missionjeet.in/images/struggle.png" alt="Struggling in studies">
          <div class="info-text">
            <h3>Struggling in Studies?</h3>
            <p>Aaiye apki Samasya ka , Samadan krte hai ✨</p>
          </div>
        </div>
        <button class="btn btn-primary" onclick="location.href='/nexttoppers/strugglers-studies'">See How We Help</button>
      </section>

      <section>
        <h2 class="section-title">🎓 Our Courses</h2>
        <div class="grid" id="coursesGrid"></div>
      </section>

      <section>
        <h2 class="section-title">⭐ Featured Courses</h2>
        <div class="grid" id="featuredGrid"></div>
      </section>
    </div>
  </main>

  <footer>
    <div class="container footer-inner">
      <img src="https://i.ibb.co/G3TLgSgJ/pngtree-mv-vm-letter-vector-logo-image-332121.jpg" alt="Mtaiirus" onclick="goHome()" onerror="this.style.display='none'">
    </div>
    <p class="footer-text">© 2025 Mtaiirus · Made with ♥ for Students of India</p>
  </footer>
