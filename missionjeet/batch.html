

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MissionJeet</title>
<link rel="icon" type="image/png" href="../lo.png">
  <title>MissionJeet Course Details</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --bg2: #e8eef8;
      --panel: #ffffff;
      --panel-2: #f8fbff;
      --card: #ffffff;
      --muted: #66758f;
      --text: #172033;
      --soft: #32415f;
      --line: rgba(27, 39, 66, 0.10);
      --accent: #2563eb;
      --accent-2: #7c3aed;
      --success: #16a34a;
      --warning: #d97706;
      --danger: #dc2626;
      --shadow: 0 18px 50px rgba(36, 56, 99, 0.10);
      --radius: 22px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, .10), transparent 26%),
        radial-gradient(circle at top right, rgba(124, 58, 237, .08), transparent 22%),
        linear-gradient(180deg, #f8fbff 0%, #eef3fb 55%, #e9eff8 100%);
      color: var(--text);
      min-height: 100vh;
    }

    a { color: inherit; text-decoration: none; }
    button, input { font: inherit; }
    img { display: block; max-width: 100%; }

    .container {
      width: min(1240px, calc(100% - 28px));
      margin: 0 auto;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(16px);
      background: rgba(255, 255, 255, 0.84);
      border-bottom: 1px solid rgba(27, 39, 66, .08);
      box-shadow: 0 8px 24px rgba(31, 41, 55, .04);
    }

    .topbar-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 16px 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .brand-logo {
      width: 130px;
      height: 38px;
      border-radius: 12px;
      object-fit: cover;
      background: #fff;
      box-shadow: var(--shadow);
      border: 1px solid rgba(27,39,66,.08);
      cursor: pointer;
    }

    .brand-text h1 {
      margin: 0;
      font-size: 16px;
      font-weight: 800;
      letter-spacing: .15px;
      color: #12203a;
    }

    .brand-text p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .search-wrap {
      flex: 1;
      max-width: 420px;
      position: relative;
    }

    .search {
      width: 100%;
      height: 48px;
      border-radius: 16px;
      border: 1px solid rgba(27,39,66,.08);
      outline: none;
      background: rgba(255,255,255,0.95);
      color: var(--text);
      padding: 0 18px 0 48px;
      transition: .2s ease;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.7);
    }

    .search:focus {
      border-color: rgba(37,99,235,.45);
      box-shadow: 0 0 0 4px rgba(37,99,235,.12);
    }

    .search-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 16px;
      pointer-events: none;
    }

    .page { padding: 26px 0 38px; }

    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .breadcrumb button {
      background: none;
      border: none;
      color: inherit;
      cursor: pointer;
      padding: 0;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 24px;
      align-items: start;
    }

    .glass {
      background: linear-gradient(180deg, rgba(255,255,255,.94), rgba(248,251,255,.92));
      border: 1px solid rgba(27,39,66,.08);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .main-panel { padding: 28px; }
    .side-panel { padding: 16px; position: sticky; top: 90px; }

    .course-title {
      margin: 0 0 18px;
      font-size: clamp(26px, 3vw, 38px);
      line-height: 1.15;
      color: #13213d;
    }

    .course-meta {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 14px;
      margin-bottom: 22px;
    }

    .btn {
      border: none;
      cursor: pointer;
      transition: .22s ease;
      border-radius: 16px;
      font-weight: 700;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #3b82f6 60%, var(--accent-2));
      color: white;
      padding: 14px 20px;
      box-shadow: 0 12px 30px rgba(37,99,235,.18);
    }

    .btn-primary:hover { transform: translateY(-1px); filter: brightness(1.03); }

    .price-box strong {
      font-size: 30px;
      font-weight: 800;
      color: #16233d;
    }

    .price-box del {
      color: #8b98ae;
      margin-left: 8px;
      font-size: 18px;
    }

    .price-box p {
      margin: 6px 0 0;
      color: #16a34a;
      font-size: 13px;
      font-weight: 700;
    }

    .tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 22px;
      padding: 8px;
      border-radius: 18px;
      background: rgba(37,99,235,.05);
      border: 1px solid rgba(37,99,235,.08);
    }

    .tab {
      border: none;
      cursor: pointer;
      color: var(--muted);
      background: transparent;
      padding: 12px 16px;
      border-radius: 14px;
      font-weight: 700;
      transition: .2s ease;
    }

    .tab.active {
      color: #fff;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      box-shadow: 0 10px 22px rgba(37,99,235,.16);
    }

    .content-area { min-height: 340px; }

    .folder-path {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
      align-items: center;
    }

    .path-btn {
      background: none;
      border: none;
      color: #2563eb;
      cursor: pointer;
      padding: 0;
      font-weight: 600;
    }

    .path-btn.active {
      color: var(--text);
      font-weight: 700;
      cursor: default;
    }

    .list {
      display: grid;
      gap: 14px;
    }

    .item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px;
      background: linear-gradient(180deg, rgba(255,255,255,.98), rgba(247,250,255,.98));
      border: 1px solid rgba(27,39,66,.08);
      border-radius: 20px;
      cursor: pointer;
      position: relative;
      transition: .2s ease;
      overflow: hidden;
    }

    .item:hover {
      transform: translateY(-2px);
      border-color: rgba(37,99,235,.22);
      box-shadow: 0 14px 30px rgba(37,99,235,.10);
    }

    .thumb {
      width: 126px;
      aspect-ratio: 16/9;
      border-radius: 16px;
      object-fit: cover;
      background: #eef3fb;
      flex-shrink: 0;
      border: 1px solid rgba(27,39,66,.06);
    }

    .thumb.small { width: 92px; }

    .play-overlay {
      position: absolute;
      left: 56px;
      top: 50%;
      transform: translateY(-50%);
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: rgba(17,24,39,.55);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      border: 1px solid rgba(255,255,255,.14);
      backdrop-filter: blur(8px);
    }

    .item-info { min-width: 0; flex: 1; }
    .item-title {
      font-size: 15px;
      font-weight: 700;
      color: #1b2742;
      line-height: 1.4;
      margin-bottom: 7px;
    }

    .item-meta {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 12px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .2px;
      border: 1px solid transparent;
    }

    .pill-live {
      background: rgba(220,38,38,.10);
      color: #b91c1c;
      border-color: rgba(220,38,38,.18);
      position: absolute;
      top: 12px;
      right: 12px;
      animation: pulse 1.1s infinite alternate;
    }

    .pill-upcoming {
      background: rgba(217,119,6,.10);
      color: #b45309;
      border-color: rgba(217,119,6,.18);
      position: absolute;
      top: 12px;
      left: 12px;
    }

    .counts {
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
    }

    .test-card {
      padding: 16px;
      background: #fff;
      border: 1px solid rgba(22,147,250,.20);
      border-radius: 22px;
      box-shadow: 0 8px 18px rgba(36,56,99,.06);
      transition: .2s ease;
      overflow: hidden;
    }

    .test-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 30px rgba(22,147,250,.12);
    }

    .test-head {
      display: flex;
      gap: 16px;
      margin-bottom: 16px;
    }

    .test-icon {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      background: #ecf6ff;
      border: 1px solid rgba(22,147,250,.10);
      color: #1693fa;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-weight: 900;
      font-size: 22px;
    }

    .test-title {
      margin: 2px 0 12px;
      color: #111827;
      font-size: 18px;
      font-weight: 800;
      line-height: 1.25;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .test-times {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .test-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 14px;
      border-radius: 999px;
      background: #f2f2f2;
      color: #374151;
      font-size: 11px;
      font-weight: 700;
    }

    .test-chip strong {
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: .2px;
    }

    .test-chip::before {
      content: "";
      width: 4px;
      height: 12px;
      border-radius: 999px;
      background: #44c053;
      flex-shrink: 0;
    }

    .test-chip.ends::before { background: #eb5757; }

    .test-divider {
      height: 1px;
      border: 0;
      background: #f3f4f6;
      margin: 0 0 16px;
    }

    .test-action {
      display: flex;
      justify-content: flex-start;
    }

    .test-btn {
      height: 44px;
      padding: 0 40px;
      border: 0;
      border-radius: 14px;
      background: #1693fa;
      color: #fff;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 12px 28px rgba(22,147,250,.20);
    }

    .test-btn:hover { background: #0f85e6; }

    .empty, .loading, .error-box, .live-box {
      text-align: center;
      padding: 46px 18px;
      border-radius: 22px;
      border: 1px dashed rgba(27,39,66,.12);
      background: rgba(37,99,235,.025);
    }

    .empty h3, .live-box h3, .error-box h3 { margin: 0 0 8px; color: #1b2742; }
    .empty p, .loading p, .error-box p, .live-box p {
      margin: 0;
      color: var(--muted);
    }

    .spinner {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: 4px solid rgba(37,99,235,.10);
      border-top-color: var(--accent);
      margin: 0 auto 14px;
      animation: spin 1s linear infinite;
    }

    .overview {
      color: var(--soft);
      line-height: 1.8;
      font-size: 15px;
    }

    .overview h1, .overview h2, .overview h3 { color: #13213d; }
    .overview img { border-radius: 18px; margin: 14px 0; }

    .side-thumb {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      border-radius: 18px;
      border: 1px solid rgba(27,39,66,.08);
      margin-bottom: 16px;
    }

    .side-title {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.5;
      margin-bottom: 12px;
      color: #1b2742;
    }

    .divider {
      height: 1px;
      border: none;
      background: rgba(27,39,66,.08);
      margin: 14px 0;
    }

    .section-cards {
      display: grid;
      gap: 14px;
    }

    .simple-card {
      padding: 16px;
      border-radius: 20px;
      background: linear-gradient(180deg, rgba(255,255,255,.98), rgba(248,251,255,.98));
      border: 1px solid rgba(27,39,66,.08);
      box-shadow: 0 8px 20px rgba(36,56,99,.05);
    }

    .simple-card img {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      border-radius: 14px;
      margin-bottom: 12px;
    }

    .footer {
      border-top: 1px solid rgba(27,39,66,.08);
      margin-top: 38px;
      background: rgba(255,255,255,.78);
      backdrop-filter: blur(12px);
    }

    .footer-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
      padding: 20px 0;
      color: var(--muted);
      font-size: 14px;
    }

    .socials {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .socials a {
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(37,99,235,.05);
      border: 1px solid rgba(37,99,235,.09);
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse { from { transform: scale(.98); } to { transform: scale(1.04); } }

    @media (max-width: 980px) {
      .hero { grid-template-columns: 1fr; }
      .side-panel { position: static; }
    }

    @media (max-width: 720px) {
      .topbar-inner { flex-direction: column; align-items: stretch; }
      .search-wrap { max-width: none; }
      .main-panel { padding: 18px; }
      .item { align-items: flex-start; }
      .thumb { width: 108px; }
      .play-overlay { left: 48px; }
      .test-head { gap: 12px; }
      .test-title { white-space: normal; }
      .test-btn { width: 100%; }
      .course-title { font-size: 26px; }
      .price-box strong { font-size: 24px; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="container topbar-inner">
      <div class="brand">
        <img
          id="brandLogo"
          class="brand-logo"
          src="https://decicqog4ulhy.cloudfront.net/0/admin_v2/uploads/courses/thumbnail/7524245_1_WhatsApp%20Image%202026-03-02%20at%204.19.45%20PM.jpeg"
          alt="MissionJeet"
          onclick="goHome()"
        >
        <div class="brand-text">
          <h1>MissionJeet</h1>
          <p>by Learnbyakp</p>
        </div>
      </div>

      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input id="searchInput" class="search" type="search" placeholder="Search content, folder, pdf, video...">
      </div>
    </div>
  </header>

  <div class="page">
    <div class="container">
      <div class="breadcrumb">
        <button onclick="goHome()">Home</button>
        <span>›</span>
        <span>Course Details</span>
      </div>

      <div class="hero">
        <section class="glass main-panel">
          <div id="mainState"></div>
        </section>

        <aside class="glass side-panel" id="sidePanel"></aside>
      </div>
    </div>
  </div>

  <footer class="footer">
    <div class="container footer-inner">
      <div>MISSION JEET All Rights Reserved, 2026</div>
      <div class="socials">
        <a href="https://www.instagram.com/mission.jeet/?hl=en" target="_blank" rel="noopener noreferrer">Instagram</a>
        <a href="https://www.youtube.com/@mission_jeet" target="_blank" rel="noopener noreferrer">YouTube</a>
      </div>
    </div>
  </footer>

  <script src="../api-credentials.js"></script>
  <script src="../x/missionjeet-batch.js"></script>
</body>
</html>
