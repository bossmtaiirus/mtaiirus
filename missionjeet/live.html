<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#D4540E">
  <title>Mtaiirus — Live Classes</title>
  <meta name="description" content="Watch free live classes on Mtaiirus. Mission JEET batches — completely free.">
  <link rel="icon" href="https://i.ibb.co/G3TLgSgJ/pngtree-mv-vm-letter-vector-logo-image-332121.jpg">
  <link rel="apple-touch-icon" href="https://i.ibb.co/G3TLgSgJ/pngtree-mv-vm-letter-vector-logo-image-332121.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800;900&family=DM+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #F5F2EB;
      --bg2: #ECEAE2;
      --ink: #1A1814;
      --ink2: #6B6760;
      --ink3: #B0ADA7;
      --accent: #D4540E;
      --accentl: #F0A87A;
      --accentb: rgba(212,84,14,.08);
      --green: #2D6A3F;
      --greenl: #E4F0E8;
      --card: #FFFDFB;
      --border: rgba(26,24,20,.1);
      --borderh: rgba(26,24,20,.2);
      --font-heading: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--ink);
      -webkit-tap-highlight-color: transparent;
      -webkit-text-size-adjust: 100%;
    }

    .header {
      position: sticky; top: 0; z-index: 50;
      background: rgba(245,242,235,.92);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }
    .container { max-width: 1200px; margin: 0 auto; padding: 0 16px; }
    .header-inner {
      display: flex; align-items: center; gap: 14px;
      height: 64px; flex-wrap: wrap; padding: 10px 0;
    }
    .logo {
      height: 36px; border-radius: 8px; cursor: pointer;
      border: 1px solid var(--border);
    }
    .title {
      font-family: var(--font-heading); font-size: 1.2rem;
      font-weight: 800; letter-spacing: -.3px;
    }

    .main { padding: 24px 0; }
    .topbar {
      display: flex; flex-wrap: wrap; gap: 14px; align-items: center;
      justify-content: space-between; margin-bottom: 24px;
    }
    .topbar-right {
      display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
      justify-content: flex-end; flex: 1; min-width: 280px;
    }
    .tabs {
      display: grid; grid-template-columns: 1fr 1fr; gap: 6px;
      background: var(--bg2); padding: 5px; border-radius: 10px;
      max-width: 340px; width: 100%;
    }
    .tab-btn {
      border: 0; background: transparent; padding: 10px 14px;
      border-radius: 8px; font-weight: 600; cursor: pointer;
      font-family: var(--font-body); color: var(--ink2);
      transition: .2s;
    }
    .tab-btn.active {
      background: var(--card); color: var(--ink);
      box-shadow: 0 1px 4px rgba(26,24,20,.08);
    }

    .search-wrap { flex: 1; min-width: 260px; max-width: 420px; }
    .search-input {
      width: 100%; height: 44px; border: 1px solid var(--border);
      border-radius: 10px; padding: 0 14px; font-size: 15px;
      outline: none; background: var(--card); font-family: var(--font-body);
      color: var(--ink);
    }
    .search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(212,84,14,.08);
    }
    .search-input::placeholder { color: var(--ink3); }

    .notify-all-btn, .mini-btn, .modal-btn {
      border: 0; cursor: pointer; border-radius: 10px;
      font-weight: 600; transition: .2s ease; font-family: var(--font-body);
    }
    .notify-all-btn {
      height: 44px; padding: 0 16px;
      background: var(--ink); color: var(--bg); white-space: nowrap;
    }
    .notify-all-btn:hover { background: var(--accent); color: #fff; }

    .grid {
      display: grid; grid-template-columns: repeat(1, minmax(0, 1fr)); gap: 24px;
    }
    @media (min-width: 640px) { .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
    @media (min-width: 1024px) { .grid { grid-template-columns: repeat(3, minmax(0, 1fr)); } }

    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 16px; overflow: hidden;
      box-shadow: 0 4px 12px rgba(26,24,20,.05);
      transition: .2s;
    }
    .card:hover { box-shadow: 0 8px 24px rgba(26,24,20,.1); }

    .thumb-wrap {
      position: relative; aspect-ratio: 16 / 9;
      background: var(--bg2); overflow: hidden;
    }
    .thumb { width: 100%; height: 100%; object-fit: cover; display: block; }
    .gradient {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(26,24,20,.4), transparent);
    }
    .badge {
      position: absolute; top: 10px; left: 10px;
      display: inline-block; padding: 5px 10px;
      border-radius: 999px; font-size: 11px; font-weight: 700;
      letter-spacing: .3px;
    }
    .badge.live {
      background: var(--accent); color: #fff;
      animation: pulse 1.2s infinite;
    }
    .badge.upcoming {
      background: var(--bg2); color: var(--ink);
    }
    @keyframes pulse { 0%{opacity:1} 50%{opacity:.6} 100%{opacity:1} }

    .content { padding: 16px; }
    .course-badge {
      display: inline-block; background: var(--accentb);
      color: var(--accent); border-radius: 999px;
      padding: 5px 10px; font-size: 11px; font-weight: 700;
      margin-bottom: 10px;
    }
    .card-title {
      font-family: var(--font-heading); font-size: 17px; font-weight: 700;
      line-height: 1.35; margin: 0 0 10px; letter-spacing: -.2px;
    }
    .meta { font-size: 13px; color: var(--ink2); margin-top: 8px; }

    .notification-row { margin-top: 12px; display: flex; justify-content: flex-start; }
    .mini-btn {
      min-height: 36px; padding: 8px 12px;
      background: var(--accentb); color: var(--accent);
      font-size: 13px; border-radius: 8px;
    }
    .mini-btn.active { background: var(--green); color: #fff; }
    .mini-btn.disabled { background: var(--bg2); color: var(--ink3); }

    .countdown {
      margin-top: 12px; padding-top: 12px;
      border-top: 1px dashed var(--border);
      text-align: center; font-weight: 600; color: var(--ink2);
    }
    .watch-btn {
      width: 100%; margin-top: 16px; height: 44px;
      border: 0; border-radius: 10px;
      background: var(--ink); color: var(--bg);
      font-size: 15px; font-weight: 600; cursor: pointer;
      font-family: var(--font-body);
      transition: .2s;
    }
    .watch-btn:hover { background: var(--accent); color: #fff; }

    .center { text-align: center; padding: 40px 12px; }
    .error { color: var(--accent); font-weight: 700; }
    .muted { color: var(--ink2); }

    .skeleton {
      background: linear-gradient(90deg, var(--bg2), var(--bg), var(--bg2));
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite; border-radius: 8px;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    .skeleton-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 16px; overflow: hidden;
    }
    .hidden { display: none !important; }
    .results-info { margin-bottom: 18px; font-size: 14px; color: var(--ink2); }

    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(26,24,20,.55);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000; padding: 16px;
    }
    .modal {
      width: 100%; max-width: 560px; background: var(--card);
      border-radius: 18px; box-shadow: 0 20px 40px rgba(0,0,0,.2);
      overflow: hidden; border: 1px solid var(--border);
    }
    .modal-header { padding: 18px 20px 10px; border-bottom: 1px solid var(--border); }
    .modal-title { margin: 0; font-family: var(--font-heading); font-size: 20px; font-weight: 700; }
    .modal-body { padding: 18px 20px; max-height: 70vh; overflow: auto; color: var(--ink2); }
    .modal-actions {
      padding: 14px 20px 20px; display: flex;
      flex-wrap: wrap; gap: 10px; justify-content: flex-end;
    }
    .modal-btn { min-height: 42px; padding: 0 16px; }
    .modal-btn.primary {
      background: var(--ink); color: var(--bg);
    }
    .modal-btn.primary:hover { background: var(--accent); color: #fff; }
    .modal-btn.secondary {
      background: var(--bg2); color: var(--ink);
    }
    .batch-list { display: grid; gap: 10px; }
    .batch-item {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 14px; border: 1px solid var(--border);
      border-radius: 12px; background: var(--bg);
    }
    .batch-item input { transform: scale(1.15); accent-color: var(--accent); }
    .status-chip {
      display: inline-block; padding: 6px 10px;
      background: var(--accentb); color: var(--accent);
      border-radius: 999px; font-size: 12px; font-weight: 700;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="container">
      <div class="header-inner">
        <img class="logo"
          src="https://i.ibb.co/G3TLgSgJ/pngtree-mv-vm-letter-vector-logo-image-332121.jpg"
          alt="Mtaiirus" onclick="location.href='/missionjeet'"
          onerror="this.style.display='none'">
        <div class="title">Live Classes</div>
      </div>
    </div>
  </header>

  <main class="main container">
    <div class="topbar">
      <div class="tabs">
        <button id="liveTab" class="tab-btn active">LIVE</button>
        <button id="upcomingTab" class="tab-btn">UPCOMING</button>
      </div>
      <div class="topbar-right">
        <div class="search-wrap">
          <input id="searchInput" class="search-input" type="text" placeholder="Search by title, course, live, upcoming...">
        </div>
        <button id="notifyAllBtn" class="notify-all-btn">🔔 Notify me for all my classes</button>
      </div>
    </div>

    <div id="resultsInfo" class="results-info"></div>
    <div id="errorBox" class="center hidden">
      <div class="error">Error Loading Live Classes</div>
      <p id="errorText" class="muted"></p>
    </div>
    <div id="contentBox"></div>
  </main>

  <div id="permissionModal" class="modal-backdrop hidden">
    <div class="modal">
      <div class="modal-header"><h3 class="modal-title">Turn on notifications</h3></div>
      <div class="modal-body">
        <div>Lecture live hote hi notification milega thumbnail aur title ke saath.</div>
        <div class="status-chip" id="permissionStatusText">Notification permission required</div>
      </div>
      <div class="modal-actions">
        <button class="modal-btn secondary" onclick="closePermissionModal()">Close</button>
        <button class="modal-btn primary" onclick="enableNotifications()">Notification On</button>
      </div>
    </div>
  </div>

  <div id="batchModal" class="modal-backdrop hidden">
    <div class="modal">
      <div class="modal-header"><h3 class="modal-title">Select batches</h3></div>
      <div class="modal-body">
        <div class="muted" style="margin-bottom:14px;">Jo batches select karoge unke upcoming aur live lectures ke liye notifications milenge.</div>
        <div id="batchList" class="batch-list"></div>
      </div>
      <div class="modal-actions">
        <button class="modal-btn secondary" onclick="closeBatchModal()">Cancel</button>
        <button class="modal-btn primary" onclick="saveBatchSubscriptions()">Save Selection</button>
      </div>
    </div>
  </div>

  <script>

  <script src="../api-credentials.js"></script>
  <script src="../x/missionlive.js"></script>
</body>
</html>
