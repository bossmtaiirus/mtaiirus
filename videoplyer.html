  <link rel="stylesheet" href="videocss.css" />
  <style>
    /* ========== PROFESSIONAL OVERRIDE – no HTML/logic touched ========== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a12;
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }

    .vp-root {
      width: 100%;
      max-width: 1280px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* Video shell */
    .vp-video-shell {
      position: relative;
      width: 100%;
      background: #000;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 30px 50px -15px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.07);
      aspect-ratio: 16 / 9;
      background: #0b0b14;
    }

    .vp-video {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
      background: black;
    }

    /* Loader spinner */
    #videoLoader {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 20;
    }

    .spinner {
      position: relative;
      width: 72px;
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .spinner img {
      width: 44px;
      height: 44px;
      object-fit: contain;
      border-radius: 10px;
      z-index: 2;
      background: rgba(10,10,18,0.75);
      backdrop-filter: blur(6px);
      padding: 6px;
    }

    .spinner-ring {
      position: absolute;
      width: 100%;
      height: 100%;
      border: 3px solid rgba(255,255,255,0.08);
      border-top: 3px solid #d4af37;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    .load-text {
      margin-top: 16px;
      color: white;
      font-weight: 500;
      font-size: 0.9rem;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(10px);
      padding: 6px 20px;
      border-radius: 24px;
      letter-spacing: 0.4px;
    }

    /* Center play */
    .vp-center-play {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(18, 18, 28, 0.8);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.2);
      color: white;
      font-size: 2.5rem;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 25;
      transition: all 0.2s ease;
      box-shadow: 0 10px 25px rgba(0,0,0,0.6);
      opacity: 0;
      pointer-events: none;
    }

    .vp-video-shell.paused .vp-center-play,
    .vp-video-shell:hover .vp-center-play {
      opacity: 1;
      pointer-events: auto;
    }

    /* Badges */
    .vp-badges {
      position: absolute;
      top: 18px;
      left: 18px;
      display: flex;
      gap: 10px;
      z-index: 15;
    }

    .vp-badge {
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(12px);
      color: #fff;
      font-weight: 600;
      font-size: 0.7rem;
      padding: 6px 14px;
      border-radius: 20px;
      letter-spacing: 0.7px;
      border: 1px solid rgba(255,255,255,0.15);
    }

    /* Controls */
    .vp-controls {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.35) 70%, transparent 100%);
      backdrop-filter: blur(14px);
      padding: 20px 18px 14px;
      z-index: 30;
      border-radius: 0 0 28px 28px;
    }

    .vp-progress-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .vp-time {
      display: flex;
      gap: 4px;
      color: white;
      font-size: 0.8rem;
      font-weight: 500;
      min-width: 105px;
      opacity: 0.9;
    }

    .vp-progress-bar {
      flex: 1;
      height: 5px;
      background: rgba(255,255,255,0.18);
      border-radius: 10px;
      position: relative;
      cursor: pointer;
      transition: height 0.15s;
    }

    .vp-progress-bar:hover {
      height: 7px;
    }

    .vp-progress-buffer {
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      background: rgba(255,255,255,0.3);
      border-radius: 10px;
      width: 0%;
    }

    .vp-progress-fill {
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      background: #d4af37;
      border-radius: 10px;
      width: 0%;
      box-shadow: 0 0 10px #d4af37cc;
    }

    .vp-progress-handle {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 15px;
      height: 15px;
      background: white;
      border-radius: 50%;
      box-shadow: 0 0 10px black;
      left: 0%;
      display: none;
      border: 2px solid #d4af37;
    }

    .vp-progress-bar:hover .vp-progress-handle {
      display: block;
    }

    .vp-progress-tooltip {
      position: absolute;
      bottom: 24px;
      transform: translateX(-50%);
      background: #000;
      color: white;
      padding: 4px 10px;
      border-radius: 8px;
      font-size: 0.7rem;
      display: none;
      pointer-events: none;
    }

    .vp-progress-bar:hover .vp-progress-tooltip {
      display: block;
    }

    .vp-controls-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .vp-controls-left,
    .vp-controls-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .vp-ctrl-btn {
      background: transparent;
      border: none;
      color: white;
      font-size: 1.1rem;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.2s;
      backdrop-filter: blur(4px);
    }

    .vp-ctrl-btn:hover {
      background: rgba(255,255,255,0.15);
    }

    #volumeSlider {
      width: 70px;
      accent-color: #d4af37;
      background: rgba(255,255,255,0.2);
      border-radius: 6px;
      height: 4px;
      cursor: pointer;
    }

    .download-icon {
      width: 18px;
      height: 18px;
      filter: brightness(0) invert(1);
    }

    .vp-more-wrap {
      position: relative;
    }

    .vp-more-menu {
      position: absolute;
      bottom: 50px;
      right: 0;
      background: rgba(18, 18, 26, 0.92);
      backdrop-filter: blur(30px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 18px;
      padding: 8px;
      min-width: 185px;
      display: none;
      flex-direction: column;
      gap: 6px;
      z-index: 50;
      box-shadow: 0 20px 35px rgba(0,0,0,0.7);
    }

    .vp-more-menu.active {
      display: flex;
    }

    .vp-more-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: #ddd;
      font-size: 0.85rem;
      padding: 7px 12px;
      border-radius: 12px;
      background: rgba(255,255,255,0.04);
    }

    .vp-speed-select,
    .vp-quality-select {
      background: #2a2a36;
      border: 1px solid #444;
      color: white;
      padding: 5px 10px;
      border-radius: 14px;
      font-size: 0.8rem;
      cursor: pointer;
      outline: none;
    }

    .vp-quality-select2 {
      background: transparent;
      border: none;
      color: white;
      font-size: 1.3rem;
      cursor: pointer;
    }

    /* Card */
    .vp-card {
      background: rgba(15, 15, 22, 0.7);
      backdrop-filter: blur(24px);
      border-radius: 24px;
      padding: 18px 28px;
      border: 1px solid rgba(255,255,255,0.08);
      color: #f0f0f0;
    }

    .vp-title-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .vp-pill {
      background: rgba(212, 175, 55, 0.15);
      color: #d4af37;
      font-weight: 600;
      font-size: 0.75rem;
      padding: 5px 14px;
      border-radius: 20px;
      width: fit-content;
    }

    .vp-title {
      font-size: 1.7rem;
      font-weight: 600;
      margin: 4px 0 2px;
    }

    .vp-subtitle {
      color: #aaa;
      font-size: 0.9rem;
    }

    .vp-toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #1a1a25;
      color: white;
      padding: 10px 28px;
      border-radius: 30px;
      font-weight: 500;
      backdrop-filter: blur(20px);
      z-index: 200;
      opacity: 0;
      transition: opacity 0.3s;
      border: 1px solid #d4af37;
    }

    @media (max-width: 600px) {
      .vp-controls-left, .vp-controls-right {
        gap: 6px;
      }
    }
  </style>
</head>
<body>
  <!-- Fullscreen direct root (sirf ye hi fullscreen hoga) -->
  <div class="vp-root" id="vpRoot">
    <div class="vp-video-shell paused" id="vpVideoShell">
      <video id="video" class="vp-video"></video>

      <!-- Spinner with logo and % -->
      <div id="videoLoader">
        <div class="spinner">
          <img src="lo.png" alt="Logo" />
          <div class="spinner-ring"></div>
        </div>
        <div class="load-text">Loading... 0%</div>
      </div>

      <!-- Center play -->
      <button class="vp-center-play" id="centerPlayBtn" aria-label="Play / Pause">
        ▶
      </button>

      <!-- Badges -->
      <div class="vp-badges">
        <span class="vp-badge ghost" id="vpVodBadge">RECORDED</span>
      </div>

      <!-- Glass controls -->
      <div class="vp-controls" id="vpControls">
        <div class="vp-progress-wrap">
          <div class="vp-time">
            <span id="vpCurrentTime">00:00:00</span>
            <span>/</span>
            <span id="vpDuration">00:00:00</span>
          </div>
          <div class="vp-progress-bar" id="vpProgressBar">
            <div class="vp-progress-buffer" id="vpBuffer"></div>
            <div class="vp-progress-fill" id="vpProgressFill"></div>
            <div class="vp-progress-tooltip" id="vpProgressTooltip">00:00</div>
            <div class="vp-progress-handle" id="vpProgressHandle"></div>
          </div>
        </div>

        <div class="vp-controls-row">
          <div class="vp-controls-left">
            <button class="vp-ctrl-btn" id="backwardBtn" aria-label="Seek -10s">⏪</button>
            <button class="vp-ctrl-btn" id="playPauseBtn" aria-label="Play / Pause">▶</button>
            <button class="vp-ctrl-btn" id="forwardBtn" aria-label="Seek +10s">⏩</button>

            <button class="vp-ctrl-btn" id="muteBtn" aria-label="Mute / Unmute">🔊</button>
            <input
              type="range"
              id="volumeSlider"
              min="0"
              max="1"
              step="0.01"
              value="1"
            />

            <!-- Screenshot -->
            <button class="vp-ctrl-btn" id="screenshotBtn" aria-label="Screenshot">
              📸
            </button>
          </div>

          <div class="vp-controls-right">
            <!-- More (⋮) menu -->
             <button class="vp-ctrl-btn" id="redirectBtn" aria-label="Download video">
  <img src="dow.png" alt="Download" class="download-icon" />
</button>
            <div class="vp-more-wrap">


              <button id="moreBtn" class="vp-more-btn" aria-label="More options">
                ⚙️
              </button>
            
              <div id="moreMenu" class="vp-more-menu">
                <!-- Speed -->
                <div class="vp-more-item">
                  <span>Speed</span>
                  <select id="vpSpeedSelect" class="vp-speed-select">
                    <option value="0.5">0.5x</option>
                    <option value="0.75">0.75x</option>
                    <option value="1" selected>1.0x</option>
                    <option value="1.25">1.25x</option>
                    <option value="1.5">1.5x</option>
                    <option value="1.75">1.75x</option>
                    <option value="2">2.0x</option>
                    <option value="2.5">2.5x</option>
                    <option value="3">3.0x</option>
                    <option value="3.5">3.5x</option>
                    <option value="4">4.0x</option>
                    <option value="4.5">4.5x</option>
                    <option value="5">5x</option>
                    <option value="6">6x</option>
                    <option value="10">10x</option>
                  </select>
                </div>

                <!-- Quality -->
   <div class="vp-more-item" id="moreQualityRow">
  <span>Quality</span>

  <select id="qualitySelect" class="vp-quality-select">
    <option value="auto" selected>Auto</option>
    <option value="1080">1080p</option>
    <option value="720">720p</option>
    <option value="480">480p</option>
    <option value="420">420p</option>
    <option value="360">360p</option>
    <option value="240">240p</option>
  
  </select>
</div>

             
 <div class="vp-more-item" >
  <span>Picture in Picture</span>
                <!-- Picture in Picture -->
                <button class="vp-quality-select2" id="pipBtn">
                  <span>  📺</span>
                </button>
</div>
                <!-- Download -->
                
              </div>
            </div>

            <!-- Fullscreen button (menu ke bahar hi rahe) -->
            <button class="vp-ctrl-btn" id="fullscreenBtn" aria-label="Fullscreen">⛶</button>
          </div>
        </div>
      </div>
    </div>

   

    <div class="vp-card" id="playerContainer">
      <header class="vp-header">
        <div class="vp-title-group">

          <span class="vp-pill">𝘓𝘦𝘢𝘳𝘯𝘣𝘺𝘢𝘬𝘱</span>
          <h1>Lecture</h1>
          <h1 id="videoTitleTxt" class="vp-title">Loading...</h1>
          <p class="vp-subtitle" id="vpMeta">
            
          </p>
          
        </div>
      </header>
    </div>

    <!-- Toast -->
    <div class="vp-toast" id="vpToast"></div>
  </div>

  <!-- Download redirect script -->


  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script src="../x/video.js"></script>
</body>

    }

    .vp-more-menu {
      position: absolute;
      bottom: 50px;
      right: 0;
      background: rgba(18, 18, 26, 0.92);
      backdrop-filter: blur(30px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 18px;
      padding: 8px;
      min-width: 185px;
      display: none;
      flex-direction: column;
      gap: 6px;
      z-index: 50;
      box-shadow: 0 20px 35px rgba(0,0,0,0.7);
    }

    .vp-more-menu.active {
      display: flex;
    }

    .vp-more-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: #ddd;
      font-size: 0.85rem;
      padding: 7px 12px;
      border-radius: 12px;
      background: rgba(255,255,255,0.04);
    }

    .vp-speed-select,
    .vp-quality-select {
      background: #2a2a36;
      border: 1px solid #444;
      color: white;
      padding: 5px 10px;
      border-radius: 14px;
      font-size: 0.8rem;
      cursor: pointer;
      outline: none;
    }

    .vp-quality-select2 {
      background: transparent;
      border: none;
      color: white;
      font-size: 1.3rem;
      cursor: pointer;
    }

    /* Card */
    .vp-card {
      background: rgba(15, 15, 22, 0.7);
      backdrop-filter: blur(24px);
      border-radius: 24px;
      padding: 18px 28px;
      border: 1px solid rgba(255,255,255,0.08);
      color: #f0f0f0;
    }

    .vp-title-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .vp-pill {
      background: rgba(212, 175, 55, 0.15);
      color: #d4af37;
      font-weight: 600;
      font-size: 0.75rem;
      padding: 5px 14px;
      border-radius: 20px;
      width: fit-content;
    }

    .vp-title {
      font-size: 1.7rem;
      font-weight: 600;
      margin: 4px 0 2px;
    }

    .vp-subtitle {
      color: #aaa;
      font-size: 0.9rem;
    }

    .vp-toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #1a1a25;
      color: white;
      padding: 10px 28px;
      border-radius: 30px;
      font-weight: 500;
      backdrop-filter: blur(20px);
      z-index: 200;
      opacity: 0;
      transition: opacity 0.3s;
      border: 1px solid #d4af37;
    }

    @media (max-width: 600px) {
      .vp-controls-left, .vp-controls-right {
        gap: 6px;
      }
    }
  </style>
</head>
<body>
  <!-- Fullscreen direct root (sirf ye hi fullscreen hoga) -->
  <div class="vp-root" id="vpRoot">
    <div class="vp-video-shell paused" id="vpVideoShell">
      <video id="video" class="vp-video"></video>

      <!-- Spinner with logo and % -->
      <div id="videoLoader">
        <div class="spinner">
          <img src="lo.png" alt="Logo" />
          <div class="spinner-ring"></div>
        </div>
        <div class="load-text">Loading... 0%</div>
      </div>

      <!-- Center play -->
      <button class="vp-center-play" id="centerPlayBtn" aria-label="Play / Pause">
        ▶
      </button>

      <!-- Badges -->
      <div class="vp-badges">
        <span class="vp-badge ghost" id="vpVodBadge">RECORDED</span>
      </div>

      <!-- Glass controls -->
      <div class="vp-controls" id="vpControls">
        <div class="vp-progress-wrap">
          <div class="vp-time">
            <span id="vpCurrentTime">00:00:00</span>
            <span>/</span>
            <span id="vpDuration">00:00:00</span>
          </div>
          <div class="vp-progress-bar" id="vpProgressBar">
            <div class="vp-progress-buffer" id="vpBuffer"></div>
            <div class="vp-progress-fill" id="vpProgressFill"></div>
            <div class="vp-progress-tooltip" id="vpProgressTooltip">00:00</div>
            <div class="vp-progress-handle" id="vpProgressHandle"></div>
          </div>
        </div>

        <div class="vp-controls-row">
          <div class="vp-controls-left">
            <button class="vp-ctrl-btn" id="backwardBtn" aria-label="Seek -10s">⏪</button>
            <button class="vp-ctrl-btn" id="playPauseBtn" aria-label="Play / Pause">▶</button>
            <button class="vp-ctrl-btn" id="forwardBtn" aria-label="Seek +10s">⏩</button>

            <button class="vp-ctrl-btn" id="muteBtn" aria-label="Mute / Unmute">🔊</button>
            <input
              type="range"
              id="volumeSlider"
              min="0"
              max="1"
              step="0.01"
              value="1"
            />

            <!-- Screenshot -->
            <button class="vp-ctrl-btn" id="screenshotBtn" aria-label="Screenshot">
              📸
            </button>
          </div>

          <div class="vp-controls-right">
            <!-- More (⋮) menu -->
             <button class="vp-ctrl-btn" id="redirectBtn" aria-label="Download video">
  <img src="dow.png" alt="Download" class="download-icon" />
</button>
            <div class="vp-more-wrap">


              <button id="moreBtn" class="vp-more-btn" aria-label="More options">
                ⚙️
              </button>
            
              <div id="moreMenu" class="vp-more-menu">
                <!-- Speed -->
                <div class="vp-more-item">
                  <span>Speed</span>
                  <select id="vpSpeedSelect" class="vp-speed-select">
                    <option value="0.5">0.5x</option>
                    <option value="0.75">0.75x</option>
                    <option value="1" selected>1.0x</option>
                    <option value="1.25">1.25x</option>
                    <option value="1.5">1.5x</option>
                    <option value="1.75">1.75x</option>
                    <option value="2">2.0x</option>
                    <option value="2.5">2.5x</option>
                    <option value="3">3.0x</option>
                    <option value="3.5">3.5x</option>
                    <option value="4">4.0x</option>
                    <option value="4.5">4.5x</option>
                    <option value="5">5x</option>
                    <option value="6">6x</option>
                    <option value="10">10x</option>
                  </select>
                </div>

                <!-- Quality -->
   <div class="vp-more-item" id="moreQualityRow">
  <span>Quality</span>

  <select id="qualitySelect" class="vp-quality-select">
    <option value="auto" selected>Auto</option>
    <option value="1080">1080p</option>
    <option value="720">720p</option>
    <option value="480">480p</option>
    <option value="420">420p</option>
    <option value="360">360p</option>
    <option value="240">240p</option>
  
  </select>
</div>

             
 <div class="vp-more-item" >
  <span>Picture in Picture</span>
                <!-- Picture in Picture -->
                <button class="vp-quality-select2" id="pipBtn">
                  <span>  📺</span>
                </button>
</div>
                <!-- Download -->
                
              </div>
            </div>

            <!-- Fullscreen button (menu ke bahar hi rahe) -->
            <button class="vp-ctrl-btn" id="fullscreenBtn" aria-label="Fullscreen">⛶</button>
          </div>
        </div>
      </div>
    </div>

   

    <div class="vp-card" id="playerContainer">
      <header class="vp-header">
        <div class="vp-title-group">

          <span class="vp-pill">𝘓𝘦𝘢𝘳𝘯𝘣𝘺𝘢𝘬𝘱</span>
          <h1>Lecture</h1>
          <h1 id="videoTitleTxt" class="vp-title">Loading...</h1>
          <p class="vp-subtitle" id="vpMeta">
            
          </p>
          
        </div>
      </header>
    </div>

    <!-- Toast -->
    <div class="vp-toast" id="vpToast"></div>
  </div>

  <!-- Download redirect script -->


  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script src="../x/video.js"></script>
</body>
</html>
