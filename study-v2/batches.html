<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Mtaiirus — PW Batches</title>
  <link rel="icon" type="image/x-icon" href="https://i.ibb.co/G3TLgSgJ/pngtree-mv-vm-letter-vector-logo-image-332121.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #F5F2EB;
      --bg2: #ECEAE2;
      --ink: #1A1814;
      --ink2: #6B6760;
      --ink3: #B0ADA7;
      --accent: #D4540E;
      --accentl: #F0A87A;
      --accentb: rgba(212,84,14,.08);
      --green: #2D6A3F;
      --greenl: #E4F0E8;
      --blue: #1A4B8C;
      --bluel: #E4EBF7;
      --card: #FFFDFB;
      --border: rgba(26,24,20,.1);
      --borderh: rgba(26,24,20,.2);
      --danger: #D4540E;
      --success: #2D6A3F;
      --shadow: 0 16px 40px rgba(26,24,20,.10);
      --font-heading: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-body);
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      -webkit-tap-highlight-color: transparent;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    button, input { font: inherit; }
    button { cursor: pointer; border: none; }
    .hidden { display: none !important; }

    .app-header {
      position: sticky; top: 0; z-index: 50;
      background: rgba(245,242,235,.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }

    .nav {
      max-width: 1220px; margin: auto;
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px; gap: 12px;
    }
    .brand {
      display: flex; align-items: center; gap: 10px;
      font-family: var(--font-heading); font-weight: 800; font-size: 18px;
      color: var(--ink); letter-spacing: 1.2px; text-decoration: none;
    }
    .brand span { color: var(--accent); }
    .logo-img {
      width: 42px; height: 42px; border-radius: 12px;
      object-fit: cover; border: 1px solid var(--border);
    }

    .header-actions { display: flex; align-items: center; gap: 8px; }
    .icon-btn, .btn {
      border-radius: 10px; background: var(--card); color: var(--ink);
      border: 1px solid var(--border); min-height: 42px; padding: 0 14px;
      font-weight: 600; display: inline-flex; align-items: center;
      justify-content: center; gap: 8px;
      box-shadow: 0 4px 12px rgba(26,24,20,.04); transition: .2s;
      font-family: var(--font-body);
    }
    .icon-btn { width: 42px; padding: 0; }
    .btn:hover, .icon-btn:hover {
      transform: translateY(-1px);
      box-shadow: var(--shadow); border-color: var(--borderh);
    }
    .btn.primary {
      background: var(--ink); color: var(--bg); border-color: transparent;
    }
    .btn.primary:hover { background: var(--accent); }
    .btn.danger { background: var(--accentb); color: var(--accent); border-color: rgba(212,84,14,.25); }
    .btn.danger:hover { background: var(--accent); color: #fff; }
    .btn.ghost { background: transparent; box-shadow: none; }

    /* Logout Button */
    .logout-btn {
      background: var(--accentb);
      color: var(--accent);
      border: 1px solid rgba(212,84,14,.2);
      padding: 8px 16px;
      border-radius: 10px;
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .logout-btn:hover { background: var(--accent); color: #fff; }

    .tabs-container {
      display: flex; gap: 8px; margin-bottom: 20px;
      background: var(--bg2); padding: 6px; border-radius: 14px;
      width: fit-content;
    }
    .tab-btn {
      padding: 10px 24px; border-radius: 10px; font-weight: 700;
      color: var(--ink2); background: transparent; transition: .2s;
      font-family: var(--font-body);
    }
    .tab-btn.active {
      background: var(--card); color: var(--ink);
      box-shadow: 0 2px 8px rgba(26,24,20,.08);
    }

    .search-wrap { max-width: 1220px; margin: 0 auto; padding: 0 16px 14px; }
    .search-box { position: relative; }
    .search-box input {
      width: 100%; height: 48px; border: 1px solid var(--border);
      border-radius: 14px; background: var(--card); color: var(--ink);
      padding: 0 48px 0 44px; outline: none;
      box-shadow: 0 4px 12px rgba(26,24,20,.04);
      font-family: var(--font-body);
    }
    .search-box input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(212,84,14,.1);
    }
    .search-box input::placeholder { color: var(--ink3); }
    .search-icon, .clear-search {
      position: absolute; top: 50%; transform: translateY(-50%); color: var(--ink3);
    }
    .search-icon { left: 16px; }
    .clear-search { right: 12px; background: transparent; border: none; font-size: 20px; }

    .side-menu { position: fixed; inset: 0; z-index: 80; pointer-events: none; }
    .side-menu.open { pointer-events: auto; }
    .menu-overlay {
      position: absolute; inset: 0; background: rgba(26,24,20,.55);
      opacity: 0; transition: .2s;
    }
    .side-menu.open .menu-overlay { opacity: 1; }
    .menu-panel {
      position: absolute; right: 0; top: 0; height: 100%;
      width: min(360px, 92vw); background: var(--card);
      border-left: 1px solid var(--border); padding: 18px;
      transform: translateX(105%); transition: .25s;
      box-shadow: var(--shadow); overflow: auto;
    }
    .side-menu.open .menu-panel { transform: translateX(0); }
    .menu-head {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 18px;
    }
    .menu-head h2 { font-family: var(--font-heading); font-size: 1.2rem; }
    .menu-list { display: grid; gap: 10px; }
    .menu-link {
      display: flex; align-items: center; gap: 12px; text-decoration: none;
      color: var(--ink); border: 1px solid var(--border); border-radius: 14px;
      padding: 14px; background: var(--bg); font-weight: 600; text-align: left;
      font-family: var(--font-body);
    }
    .menu-link:hover { background: var(--accentb); border-color: var(--accent); }

    main { max-width: 1220px; margin: auto; padding: 22px 16px 42px; }
    .toolbar { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin-bottom: 18px; }
    .info-tip { position: relative; }
    .tooltip {
      display: none; position: absolute; top: 48px; right: 0; width: 280px;
      background: var(--card); border: 1px solid var(--border); border-radius: 14px;
      padding: 14px; box-shadow: var(--shadow); color: var(--ink2); z-index: 20;
      font-size: 13px;
    }
    .info-tip:hover .tooltip { display: block; }

    .stats-section {
      background: var(--card); border-radius: 14px; padding: 16px 24px;
      margin-bottom: 24px; display: flex; justify-content: space-between;
      align-items: center; box-shadow: 0 2px 8px rgba(26,24,20,.04);
      border: 1px solid var(--border); flex-wrap: wrap; gap: 16px;
    }
    .stats-container { display: flex; gap: 24px; flex-wrap: wrap; }
    .stat-box { display: flex; align-items: center; gap: 12px; }
    .stat-icon {
      font-size: 20px; width: 44px; height: 44px;
      display: grid; place-items: center; border-radius: 12px;
      background: var(--accentb); color: var(--accent);
    }
    .stat-info { display: flex; flex-direction: column; }
    .stat-label {
      font-size: 11px; color: var(--ink3); font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .stat-value {
      font-family: var(--font-heading); font-size: 22px;
      font-weight: 800; color: var(--ink); line-height: 1.1;
    }
    .showing-text {
      color: var(--ink2); font-size: 13px; font-weight: 500;
      display: flex; align-items: center; gap: 6px;
    }

    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 22px; }
    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 16px; overflow: hidden;
      box-shadow: 0 4px 16px rgba(26,24,20,.06);
      transition: .22s; display: flex; flex-direction: column;
    }
    .card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow); border-color: var(--borderh);
    }
    .thumb { position: relative; aspect-ratio: 16/9; background: var(--bg2); overflow: hidden; }
    .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .badge {
      position: absolute; border-radius: 999px; padding: 5px 10px;
      color: #fff; font-size: 11px; font-weight: 700; letter-spacing: .3px;
    }
    .badge.right { top: 10px; right: 10px; background: var(--green); }
    .badge.left { top: 10px; left: 10px; background: var(--accent); }

    .card-body { padding: 14px; display: flex; flex-direction: column; gap: 12px; flex: 1; }
    .course-title {
      font-family: var(--font-heading); font-size: 15px;
      line-height: 1.35; font-weight: 700; color: var(--ink);
    }
    .card-actions { margin-top: auto; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    .footer-note { text-align: center; margin-top: 28px; color: var(--ink3); font-size: 13px; }

    /* Loading Overlay */
    .loading-overlay {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; z-index: 9999; gap: 16px;
    }
    .loading-spinner {
      width: 44px; height: 44px;
      border: 4px solid var(--bg2); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text {
      font-family: var(--font-heading); font-size: 14px;
      color: var(--ink2); font-weight: 600;
    }

    @media (max-width: 900px) { .grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 620px) {
      .grid { grid-template-columns: 1fr; }
      .brand { font-size: 15px; }
      .card-actions { grid-template-columns: 1fr; }
      .nav { padding: 12px; }
      .tabs-container { width: 100%; justify-content: space-between; }
      .tab-btn { flex: 1; text-align: center; }
    }
  </style>
</head>
<body>

  <!-- Loading Overlay -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
    <p class="loading-text">Verifying access...</p>
  </div>

  <header class="app-header">
    <div class="nav">
      <a href="/" class="brand">
        <img src="https://i.ibb.co/G3TLgSgJ/pngtree-mv-vm-letter-vector-logo-image-332121.jpg" class="logo-img" alt="Mtaiirus" onerror="this.src='https://i.ibb.co/9Hm0NqsH/f69ed82b-7169-45fc-a82b-915e453c6340.png'">
        MTAI<span>IRUS</span>
      </a>

      <div class="header-actions">
        <button class="logout-btn" id="logoutBtn" onclick="handleLogout()">Logout</button>
        <button class="icon-btn" id="menuToggle" title="Menu">☰</button>
      </div>
    </div>
  </header>

  <aside class="side-menu" id="sideMenu">
    <div class="menu-overlay" data-close-menu></div>
    <div class="menu-panel">
      <div class="menu-head">
        <h2>Menu</h2>
        <button class="icon-btn" data-close-menu>×</button>
      </div>
      <div class="menu-list">
        <a class="menu-link" href="/">🏠 Home</a>
        <a class="menu-link" href="https://t.me/mtaiirus" target="_blank">📢 Telegram</a>
        <button class="menu-link" onclick="handleLogout()">🚪 Logout</button>
      </div>
    </div>
  </aside>

  <main>
    <div class="tabs-container">
      <button class="tab-btn active" id="tabAll">All Batches</button>
      <button class="tab-btn" id="tabEnrolled">Enrolled Batches</button>
    </div>

    <section class="stats-section">
      <div class="stats-container">
        <div class="stat-box">
          <div class="stat-icon">📚</div>
          <div class="stat-info">
            <span class="stat-label">Total Batches</span>
            <span class="stat-value" id="totalBatchesCount">0</span>
          </div>
        </div>
        <div class="stat-box">
          <div class="stat-icon">🎛️</div>
          <div class="stat-info">
            <span class="stat-label">Filtered Batches</span>
            <span class="stat-value" id="filteredBatchesCount">0</span>
          </div>
        </div>
      </div>
      <div class="showing-text">
        👁️ Showing <span id="showingCount" style="color:var(--ink);font-weight:700;">0</span> of <span id="totalFilteredCount" style="color:var(--ink);font-weight:700;">0</span>
      </div>
    </section>

    <section id="statusArea"></section>
    <section class="grid" id="batchGrid"></section>
    <p class="footer-note">© 2025 Mtaiirus · Made with ♥ for Students of India</p>
  </main>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>

    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1lYXRlbXFyaHF0aGdweHdzdHJsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5OTc5NjEsImV4cCI6MjA5NjU3Mzk2MX0.Qnx5wU6o0OvBFrWlq3jjt3kN2sa20nhEv4zGZbQu_pw";

    async function checkAuth() {
      try {

    // ═══════════ LOGOUT ═══════════
    async function handleLogout() {
      await supabaseClient.auth.signOut();
      localStorage.removeItem('mtaiirus_session');

      window.addEventListener('beforeprint', function(e) { e.stopImmediatePropagation(); window.print = function() { return false; }; }, true);
      try { var _n = function() {}; ['log','warn','error','info','debug','table','dir','dirxml','trace','group','groupCollapsed','groupEnd','time','timeEnd','profile','profileEnd','count','clear'].forEach(function(m) { if (console[m]) console[m] = _n; }); } catch(_) {}

</body>
</html>
