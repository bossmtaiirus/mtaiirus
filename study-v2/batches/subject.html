<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LearnByAKP - Batch Details</title>
  <style>
    :root {
      --bg: #f3f6ff;
      --card: rgba(255, 255, 255, 0.9);
      --text: #111827;
      --muted: #6b7280;
      --primary: #5a4bda;
      --primary2: #8b5cf6;
      --border: rgba(17, 24, 39, 0.08);
      --danger: #dc2626;
      --success: #16a34a;
      --warning: #f59e0b;
      --shadow: 0 18px 50px rgba(39, 41, 61, 0.12);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(90, 75, 218, 0.16), transparent 30%),
        radial-gradient(circle at top right, rgba(236, 72, 153, 0.12), transparent 28%),
        var(--bg);
      color: var(--text);
    }

    button,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
      border: none;
    }

    .app-header {
      position: sticky;
      top: 0;
      z-index: 50;
      min-height: 72px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: rgba(255, 255, 255, 0.78);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--border);
    }

    .brand-row {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .back-btn,
    .icon-btn {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      background: white;
      color: var(--text);
      display: grid;
      place-items: center;
      box-shadow: 0 10px 28px rgba(17, 24, 39, 0.08);
      border: 1px solid var(--border);
      transition: 0.2s ease;
      flex: 0 0 auto;
    }

    .back-btn:hover,
    .icon-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 32px rgba(17, 24, 39, 0.12);
    }

    .brand-text {
      min-width: 0;
    }

    .brand-text h1 {
      font-size: clamp(18px, 3vw, 25px);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 62vw;
    }

    .brand-text p {
      margin-top: 2px;
      color: var(--muted);
      font-size: 13px;
    }

    .header-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .container {
      width: min(1180px, 100%);
      margin: 0 auto;
      padding: 18px;
    }

    .hero {
      margin-top: 10px;
      border-radius: 28px;
      padding: 22px;
      color: white;
      background:
        linear-gradient(135deg, rgba(90, 75, 218, 0.96), rgba(124, 58, 237, 0.92)),
        url("https://i.ibb.co/9Hm0NqsH/f69ed82b-7169-45fc-a82b-915e453c6340.png") center/cover;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .hero::after {
      content: "";
      position: absolute;
      width: 220px;
      height: 220px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.14);
      top: -95px;
      right: -85px;
    }

    .hero-content {
      position: relative;
      z-index: 1;
    }

    .hero small {
      display: inline-flex;
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.22);
      font-weight: 700;
      margin-bottom: 10px;
    }

    .hero h2 {
      font-size: clamp(24px, 5vw, 42px);
      line-height: 1.05;
      max-width: 760px;
    }

    .hero p {
      margin-top: 10px;
      color: rgba(255,255,255,0.9);
      max-width: 650px;
    }

    .top-actions {
      margin-top: 18px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .btn {
      min-height: 46px;
      padding: 11px 15px;
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      font-weight: 800;
      transition: 0.2s ease;
      background: white;
      color: var(--text);
      border: 1px solid var(--border);
      box-shadow: 0 10px 25px rgba(17, 24, 39, 0.08);
      text-decoration: none;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 15px 35px rgba(17, 24, 39, 0.12);
    }

    .btn-primary {
      color: white;
      background: linear-gradient(135deg, var(--primary), var(--primary2));
      border: none;
    }

    .btn-danger {
      color: white;
      background: linear-gradient(135deg, #ef4444, #b91c1c);
      border: none;
    }

    .btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
    }

    .section {
      margin-top: 22px;
    }

    .section-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 14px;
    }

    .section-title {
      font-size: 22px;
      font-weight: 900;
    }

    .section-subtitle {
      color: var(--muted);
      font-size: 13px;
      margin-top: 3px;
    }

    .search-wrap {
      position: relative;
      width: min(370px, 100%);
      flex: 0 1 370px;
    }

    .search-wrap svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
    }

    .search-input {
      width: 100%;
      min-height: 44px;
      padding: 11px 14px 11px 42px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.86);
      outline: none;
      box-shadow: 0 10px 28px rgba(17, 24, 39, 0.05);
    }

    .search-input:focus {
      border-color: rgba(90, 75, 218, 0.55);
      box-shadow: 0 0 0 4px rgba(90, 75, 218, 0.12);
    }

    .live-scroller {
      display: flex;
      gap: 16px;
      overflow-x: auto;
      padding: 2px 2px 12px;
      scroll-snap-type: x mandatory;
    }

    .live-scroller::-webkit-scrollbar {
      height: 8px;
    }

    .live-scroller::-webkit-scrollbar-thumb {
      background: rgba(90, 75, 218, 0.25);
      border-radius: 999px;
    }

    .live-card {
      min-width: 306px;
      width: 306px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      overflow: hidden;
      scroll-snap-align: start;
    }

    .thumb {
      position: relative;
      aspect-ratio: 16 / 9;
      background: #e5e7eb;
      overflow: hidden;
    }

    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .badge {
      position: absolute;
      top: 11px;
      right: 11px;
      padding: 6px 10px;
      border-radius: 999px;
      color: white;
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
      box-shadow: 0 10px 25px rgba(0,0,0,0.22);
    }

    .badge.live {
      background: #dc2626;
      animation: pulse 1.2s infinite;
    }

    .badge.recorded {
      background: rgba(17,24,39,0.86);
    }

    .badge.cancelled {
      background: #dc2626;
    }

    .badge.upcoming {
      background: #f59e0b;
      color: #111827;
    }

    @keyframes pulse {
      50% { transform: scale(1.06); }
    }

    .live-body {
      padding: 14px;
    }

    .subject-name {
      color: var(--primary);
      font-weight: 900;
      font-size: 13px;
      margin-bottom: 4px;
    }

    .live-title {
      font-size: 16px;
      line-height: 1.3;
      min-height: 42px;
      font-weight: 900;
    }

    .meta-row {
      margin-top: 12px;
      display: flex;
      justify-content: space-between;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
    }

    .meta-row span {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      min-width: 0;
    }

    .meta-row span:first-child {
      max-width: 150px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .play-btn {
      width: 100%;
      margin-top: 14px;
    }

    .subject-grid {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    }

    .subject-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 12px 35px rgba(17, 24, 39, 0.08);
      transition: 0.2s ease;
    }

    .subject-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }

    .subject-card img {
      width: 46px;
      height: 46px;
      object-fit: contain;
      border-radius: 14px;
      background: #f8fafc;
      padding: 5px;
      flex: 0 0 auto;
    }

    .subject-card h3 {
      font-size: 16px;
    }

    .about-card,
    .empty-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 18px;
      box-shadow: var(--shadow);
    }

    .about-content {
      color: #374151;
      line-height: 1.7;
      overflow-wrap: anywhere;
    }

    .about-content img {
      max-width: 100%;
      border-radius: 16px;
      margin: 10px 0;
    }

    .empty-card {
      text-align: center;
      color: var(--muted);
      font-weight: 800;
    }

    .skeleton {
      background: linear-gradient(90deg, #e5e7eb, #f3f4f6, #e5e7eb);
      background-size: 200% 100%;
      animation: shine 1.2s infinite;
      border-radius: 14px;
    }

    @keyframes shine {
      to { background-position-x: -200%; }
    }

    .sk-live {
      min-width: 306px;
      width: 306px;
      height: 285px;
      border-radius: 24px;
    }

    .sk-subject {
      height: 76px;
      border-radius: 20px;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%) translateY(20px);
      background: #111827;
      color: white;
      padding: 12px 16px;
      border-radius: 16px;
      box-shadow: 0 18px 50px rgba(0,0,0,0.25);
      opacity: 0;
      pointer-events: none;
      transition: 0.25s ease;
      z-index: 120;
      font-weight: 700;
      max-width: calc(100% - 28px);
      text-align: center;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .drawer-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.42);
      opacity: 0;
      pointer-events: none;
      z-index: 90;
      transition: 0.2s ease;
    }

    .drawer {
      position: fixed;
      top: 0;
      right: 0;
      width: min(340px, 88vw);
      height: 100vh;
      background: rgba(255,255,255,0.96);
      backdrop-filter: blur(18px);
      z-index: 100;
      transform: translateX(105%);
      transition: 0.25s ease;
      box-shadow: -20px 0 70px rgba(15, 23, 42, 0.24);
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .drawer.open {
      transform: translateX(0);
    }

    .drawer-backdrop.open {
      opacity: 1;
      pointer-events: auto;
    }

    .drawer-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .drawer h3 {
      font-size: 22px;
    }

    .menu-link {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 13px 14px;
      border-radius: 16px;
      color: var(--text);
      background: #f8fafc;
      border: 1px solid var(--border);
      text-decoration: none;
      font-weight: 800;
    }

    .menu-link:hover {
      background: #eef2ff;
    }
    @media (max-width: 900px) {
  .search-wrap {
    max-width: 360px;
    flex-basis: 360px;
  }
}

    @media (max-width: 720px) {
      .container {
        padding: 14px;
      }

      .app-header {
        padding: 12px 14px;
      }

      .brand-text h1 {
        max-width: 48vw;
      }

      .top-actions {
        grid-template-columns: 1fr;
      }

      .section-head {
        align-items: stretch;
        flex-direction: column;
      }

       .search-wrap {
    width: 100%;
    max-width: min(100%, 340px);
    flex: unset;
  }

  .search-input {
    height: 42px;
    padding-left: 40px;
    font-size: 15px;
  }

      .live-card,
      .sk-live {
        min-width: 286px;
        width: 286px;
      }
    }
    @media (max-width: 420px) {
  .search-wrap {
    max-width: 100%;
  }

  .search-input {
    height: 40px;
    border-radius: 15px;
    font-size: 14px;
  }

  .search-wrap svg {
    left: 13px;
    width: 16px;
    height: 16px;
  }
}

/* Very small mobile */
@media (max-width: 340px) {
  .search-input {
    height: 38px;
    font-size: 13px;
    padding-left: 38px;
  }
}
  </style>
</head>
<body>
  <header class="app-header">
    <div class="brand-row">
      <button class="back-btn" id="backBtn" title="Back">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
          <path d="m15 18-6-6 6-6"></path>
        </svg>
      </button>
      <div class="brand-text">
        <h1 id="pageTitle">Batch</h1>
        <p>LearnByAKP PW Batch Details</p>
      </div>
    </div>

    <div class="header-actions">
      <button class="icon-btn" id="refreshBtn" title="Refresh">
        <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12a9 9 0 0 1-15.4 6.4"></path>
          <path d="M3 12A9 9 0 0 1 18.4 5.6"></path>
          <path d="M18 2v4h4"></path>
          <path d="M6 22v-4H2"></path>
        </svg>
      </button>
      <button class="icon-btn" id="menuBtn" title="Menu">
        <svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round">
          <path d="M4 6h16"></path>
          <path d="M4 12h16"></path>
          <path d="M4 18h16"></path>
        </svg>
      </button>
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <div class="hero-content">
        <h2 id="heroTitle">Loading batch...</h2>
        

        <div class="top-actions">
          <button class="btn" id="shareBtn">
            <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="18" cy="5" r="3"></circle>
              <circle cx="6" cy="12" r="3"></circle>
              <circle cx="18" cy="19" r="3"></circle>
              <path d="m8.59 13.51 6.83 3.98"></path>
              <path d="m15.41 6.51-6.82 3.98"></path>
            </svg>
            Share
          </button>

          <button class="btn" id="announcementBtn">
            <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M10.268 21a2 2 0 0 0 3.464 0"></path>
              <path d="M3.262 15.326A1 1 0 0 0 4 17h16a1 1 0 0 0 .74-1.673C19.41 13.956 18 12.499 18 8A6 6 0 0 0 6 8c0 4.499-1.411 5.956-2.738 7.326"></path>
            </svg>
            Announcement
          </button>
        </div>
      </div>
    </section>

    <section class="section">
      <div class="section-head">
        <div>
          <h2 class="section-title">Today's Classes</h2>
          <p class="section-subtitle">Live, upcoming and recorded class cards.</p>
        </div>

        <label class="search-wrap">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <path d="m21 21-4.3-4.3"></path>
          </svg>
          <input id="liveSearch" class="search-input" type="search" placeholder="Search class, teacher, subject..." />
        </label>
      </div>

      <div id="liveArea" class="live-scroller">
        <div class="skeleton sk-live"></div>
        <div class="skeleton sk-live"></div>
      </div>
    </section>

    <section class="section">
      <div class="section-head">
        <div>
          <h2 class="section-title">Subjects</h2>
          <p class="section-subtitle">Open subject content from this batch.</p>
        </div>

        <label class="search-wrap">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <path d="m21 21-4.3-4.3"></path>
          </svg>
          <input id="subjectSearch" class="search-input" type="search" placeholder="Search subject..." />
        </label>
      </div>

      <div id="subjectArea" class="subject-grid">
        <div class="skeleton sk-subject"></div>
        <div class="skeleton sk-subject"></div>
        <div class="skeleton sk-subject"></div>
        <div class="skeleton sk-subject"></div>
      </div>
    </section>

    <section class="section" id="aboutSection">
      <div class="about-card">
        <h2 class="section-title" style="margin-bottom: 12px;">About Batch</h2>
        <div id="aboutContent" class="about-content">
          <div class="skeleton" style="height: 170px;"></div>
        </div>
      </div>
    </section>
  </main>

  <div class="drawer-backdrop" id="drawerBackdrop"></div>

  <aside class="drawer" id="drawer">
    <div class="drawer-head">
      <div>
        <h3>Menu</h3>
        <p class="section-subtitle">Quick actions</p>
      </div>
      <button class="icon-btn" id="closeMenuBtn" title="Close">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round">
          <path d="M18 6 6 18"></path>
          <path d="m6 6 12 12"></path>
        </svg>
      </button>
    </div>

    <a class="menu-link" href="/" id="homeLink">
      <span>🏠</span> Home
    </a>
    <a class="menu-link" href="#" id="subjectsLink">
      <span>📚</span> Subjects
    </a>
    <a class="menu-link" href="#" id="liveLink">
      <span>📺</span> Today's Classes
    </a>
    <a class="menu-link" href="#" id="aboutLink">
      <span>ℹ️</span> About Batch
    </a>
  </aside>

  <div class="toast" id="toast"></div>

  <script src="/apv/subj.js"></script>
</body>
</html>
