<!DOCTYPE html><html lang="en"><head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Topic Content Viewer</title>
  <style>
    :root {
      --bg: #f3f7ff;
      --bg2: #ffffff;
      --card: rgba(255,255,255,0.82);
      --text: #132033;
      --muted: #6b7a90;
      --border: rgba(19,32,51,0.12);
      --primary: #5b4bdb;
      --primary2: #7a5cff;
      --success: #16a34a;
      --danger: #dc2626;
      --warning: #f59e0b;
      --shadow: 0 18px 50px rgba(15,23,42,0.10);
    }

    body.dark {
      --bg: #08111f;
      --bg2: #101a2c;
      --card: rgba(16,26,44,0.82);
      --text: #edf3ff;
      --muted: #9fb0cb;
      --border: rgba(255,255,255,0.10);
      --primary: #7b83ff;
      --primary2: #9e67ff;
      --success: #22c55e;
      --danger: #ef4444;
      --warning: #fbbf24;
      --shadow: 0 20px 60px rgba(0,0,0,0.35);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(91,75,219,0.14), transparent 28%),
        radial-gradient(circle at top right, rgba(122,92,255,0.12), transparent 25%),
        var(--bg);
      min-height: 100vh;
      transition: .25s ease;
    }

    .wrap {
      max-width: 1280px;
      margin: 0 auto;
      padding: 18px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .brand-icon {
      width: 52px;
      height: 52px;
      border-radius: 18px;
      background: linear-gradient(135deg, var(--primary), var(--primary2));
      display: grid;
      place-items: center;
      color: #fff;
      font-size: 24px;
      box-shadow: var(--shadow);
      font-weight: 800;
    }

    .brand h1 {
      margin: 0;
      font-size: 24px;
    }

    .brand p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .btn, .tab-btn, .icon-btn {
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      border-radius: 14px;
      padding: 11px 16px;
      cursor: pointer;
      font-weight: 700;
      transition: .2s ease;
      box-shadow: none;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .btn:hover, .tab-btn:hover, .icon-btn:hover {
      transform: translateY(-1px);
      box-shadow: var(--shadow);
    }

    .btn.primary {
      background: linear-gradient(135deg, var(--primary), var(--primary2));
      color: #fff;
      border: none;
    }

    .btn.secondary {
      background: var(--bg2);
    }

    .btn:disabled {
      opacity: .6;
      cursor: not-allowed;
      transform: none;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      overflow: hidden;
    }

    .panel-head {
      padding: 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .panel-head h2 {
      margin: 0;
      font-size: 22px;
    }

    .panel-head p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      padding: 14px 18px 0;
      overflow-x: auto;
    }

    .tab-btn {
      padding: 14px 10px;
      text-align: center;
      font-size: 14px;
      white-space: nowrap;
    }

    .tab-btn.active {
      background: linear-gradient(135deg, var(--primary), var(--primary2));
      color: #fff;
      border-color: transparent;
    }

    .content {
      padding: 18px;
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .section-title h3 {
      margin: 0;
      font-size: 20px;
    }

    .section-title span {
      color: var(--muted);
      font-size: 13px;
    }

    .grid {
      display: grid;
      gap: 16px;
    }

    .lecture-grid {
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    }

    .doc-grid {
      grid-template-columns: 1fr;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 22px;
      overflow: hidden;
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .lecture-thumb {
      position: relative;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      background: #d9e2f5;
    }

    body.dark .lecture-thumb {
      background: #18243c;
    }

    .lecture-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .badge {
      position: absolute;
      top: 12px;
      left: 12px;
      padding: 8px 11px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      color: #fff;
      background: rgba(0,0,0,0.72);
    }

    .card-body {
      padding: 15px;
    }

    .meta-line {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 8px;
    }

    .title {
      font-size: 17px;
      font-weight: 800;
      line-height: 1.4;
      margin-bottom: 10px;
    }

    .info-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 14px;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .actions .btn {
      flex: 1;
      min-width: 120px;
    }

    .doc-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px;
    }

    .doc-left {
      display: flex;
      gap: 12px;
      align-items: center;
      min-width: 0;
      flex: 1;
    }

    .doc-icon {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--primary), var(--primary2));
      color: white;
      font-size: 20px;
      flex: 0 0 44px;
    }

    .doc-title {
      font-weight: 700;
      word-break: break-word;
    }

    .doc-sub {
      color: var(--muted);
      font-size: 12px;
      margin-top: 4px;
    }

    .empty, .loading, .error {
      text-align: center;
      padding: 42px 18px;
      border-radius: 24px;
      background: var(--card);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }

    .empty h3, .loading h3, .error h3 {
      margin: 0 0 10px;
      font-size: 22px;
    }

    .empty p, .loading p, .error p {
      margin: 0;
      color: var(--muted);
    }

    /* Modal Styles */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.42);
      display: none;
      align-items: flex-end;
      justify-content: center;
      z-index: 1000;
      padding: 16px;
    }

    .modal-backdrop.show {
      display: flex;
    }

    .sheet {
      width: 100%;
      max-width: 520px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 26px 26px 0 0;
      box-shadow: var(--shadow);
      padding: 18px;
      animation: slideUp .22s ease;
    }

    @keyframes slideUp {
      from { transform: translateY(24px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .sheet h4 {
      margin: 0 0 6px;
      font-size: 20px;
    }

    .sheet p {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 14px;
    }

    .sheet-actions {
      display: grid;
      gap: 10px;
    }

    /* Multi-Notes List Styles */
    .note-list-item {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 80%;
      padding: 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 14px;
    }

    .note-list-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: #e0e7ff;
      color: var(--primary);
      display: grid;
      place-items: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    body.dark .note-list-icon { background: rgba(91,75,219,0.2); }

    .note-list-info {
      flex: 1;
      min-width: 0;
    }

    .note-list-title {
      font-size: 13px;
      font-weight: 100;
      width: 100%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
    }

    .note-list-actions {
      display: flex;
      gap: 8px;
    }

    .note-list-btn {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--bg2);
      display: grid;
      place-items: center;
      cursor: pointer;
      color: var(--primary);
      transition: .2s ease;
    }
    .note-list-btn:hover { background: var(--bg); transform: translateY(-1px); }

    @media (max-width: 768px) {
      .tabs { grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); }
    }
    @media (max-width: 640px) {
      .wrap { padding: 12px; }
      .panel-head h2 { font-size: 20px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="brand">
        <div class="brand-icon">📚</div>
        <div>
          <h1 id="pageTitle">Topic Content</h1>
          <p>PW by learnbyakp</p>
        </div>
      </div>
      <button id="themeBtn" class="icon-btn">🌙 Night Mode</button>
    </div>

    <div class="panel">
      <div class="panel-head">
        <div>
          <h2 id="topicHeading">Loading...</h2>
          <p id="topicSub">Fetching content...</p>
        </div>
      </div>

      <div class="tabs">
        <button class="tab-btn active" data-tab="lectures">🎥 Lectures</button>
        <button class="tab-btn" data-tab="notes">📝 Notes</button>
        <button class="tab-btn" data-tab="dpp">📄 DPP</button>
        <button class="tab-btn" data-tab="dppVideos">🎬 DPP Videos</button>
        <button class="tab-btn" data-tab="dppQuiz">⏱️ DPP Quiz</button>
      </div>

      <div class="content">
        <div class="section-title">
          <h3 id="sectionTitle">Video Lectures</h3>
          <span id="sectionCount">0 items</span>
        </div>
        <div id="contentArea"></div>
      </div>
    </div>
  </div>

  <div class="modal-backdrop" id="pdfSheetBackdrop">
    <div class="sheet">
      <h4 id="pdfSheetTitle">Choose Action</h4>
      <p>Open or download this document.</p>
      <div class="sheet-actions">
        <button class="btn primary" id="pdfOpenBtn">📖 Direct Open</button>
        <button class="btn primary" id="pdfViewBtn">🌐 View Online</button>
        <button class="btn secondary" id="pdfDownloadBtn">⬇️ Download</button>
        <button class="btn" id="pdfCloseBtn">Close</button>
      </div>
    </div>
  </div>

  <div class="modal-backdrop" id="notesListSheetBackdrop">
    <div class="sheet" style="max-height: 80vh; display: flex; flex-direction: column;">
      <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px;">
        <div style="flex:1; padding-right:10px;">
          <p style="margin:0 0 4px; font-size:12px; color:var(--muted); font-weight:600; text-transform:uppercase;">Notes & Attachments</p>
          <h4 id="notesListSheetTitle" style="margin:0; font-size:16px; line-height:1.4;">Loading...</h4>
        </div>
        <button class="icon-btn" id="notesListCloseBtn" style="padding: 6px 12px; border-radius:10px;">✕</button>
      </div>
      <div id="notesListContent" style="overflow-y: auto; flex: 1; display: grid; gap: 10px; padding-bottom: 10px;">
        </div>
    </div>
  </div>

  <div class="modal-backdrop" id="videoSheetBackdrop">
    <div class="sheet">
      <h4 id="videoSheetTitle">Choose Player</h4>
      <p>Select how you want to play or download the video.</p>
      <div class="sheet-actions">
        <button class="btn" id="playAppleBtn">🍎 Play on Apple</button>
        <button class="btn primary" id="playAndroidBtn">📱 Android / Normal</button>
        <button class="btn" id="videoCloseBtn">Close</button>
      </div>
    </div>
  </div>

  <script src="./apv/pwtype.js"></script>
</body>
</html>
