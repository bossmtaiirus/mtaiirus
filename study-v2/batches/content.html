<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PW Topics - LearnByAKP</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    :root{--primary:#5a4bda;--primary2:#7c3aed;--bg:#f6f7fb;--card:#fff;--text:#111827;--muted:#6b7280;--border:#e5e7eb;--danger:#ef4444;--success:#22c55e;--shadow:0 16px 40px rgba(15,23,42,.10)}
    body{min-height:100vh;background:radial-gradient(circle at top left,#ece9ff 0,#f8fafc 38%,#f6f7fb 100%);color:var(--text)}
    body.dark{--bg:#070816;--card:#101223;--text:#f8fafc;--muted:#a7adbd;--border:#24283d;background:radial-gradient(circle at top left,#1e1b4b 0,#090b17 45%,#050611 100%)}
    button,input{font:inherit}button{cursor:pointer;border:none}.hidden{display:none!important}

    .app-header{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.84);backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}body.dark .app-header{background:rgba(10,12,28,.84)}
    .nav{max-width:980px;margin:auto;display:flex;align-items:center;justify-content:space-between;padding:14px 16px;gap:12px}.left-nav{display:flex;align-items:center;gap:10px;min-width:0}.brand-text{min-width:0}.brand-text h1{font-size:18px;font-weight:950;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.brand-text p{font-size:12px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.logo{width:38px;height:38px;border-radius:14px;background:linear-gradient(135deg,var(--primary),#14b8a6);color:#fff;display:grid;place-items:center;font-weight:950;box-shadow:0 10px 25px rgba(90,75,218,.3)}
    .header-actions{display:flex;align-items:center;gap:8px}.icon-btn,.btn{border-radius:14px;background:var(--card);color:var(--text);border:1px solid var(--border);min-height:42px;padding:0 14px;font-weight:850;display:inline-flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 8px 20px rgba(15,23,42,.06);transition:.2s;text-decoration:none}.icon-btn{width:42px;padding:0}.btn:hover,.icon-btn:hover{transform:translateY(-1px);box-shadow:var(--shadow)}.btn.primary{background:linear-gradient(135deg,var(--primary),var(--primary2));color:#fff;border-color:transparent}.btn.ghost{background:transparent;box-shadow:none}.btn.danger{background:#fee2e2;color:#991b1b;border-color:#fecaca}

    .search-wrap{max-width:980px;margin:0 auto;padding:0 16px 14px}.search-box{position:relative}.search-box input{width:100%;height:48px;border:1px solid var(--border);border-radius:18px;background:var(--card);color:var(--text);padding:0 48px 0 44px;outline:none;box-shadow:0 10px 25px rgba(15,23,42,.06)}.search-box input:focus{border-color:var(--primary);box-shadow:0 0 0 4px rgba(90,75,218,.14)}.search-icon,.clear-search{position:absolute;top:50%;transform:translateY(-50%);color:var(--muted)}.search-icon{left:16px}.clear-search{right:12px;background:transparent;border:none;font-size:20px;color:var(--muted)}

    .side-menu{position:fixed;inset:0;z-index:80;pointer-events:none}.side-menu.open{pointer-events:auto}.menu-overlay{position:absolute;inset:0;background:rgba(0,0,0,.55);opacity:0;transition:.2s}.side-menu.open .menu-overlay{opacity:1}.menu-panel{position:absolute;right:0;top:0;height:100%;width:min(360px,92vw);background:var(--card);border-left:1px solid var(--border);padding:18px;transform:translateX(105%);transition:.25s;box-shadow:var(--shadow);overflow:auto}.side-menu.open .menu-panel{transform:translateX(0)}.menu-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}.menu-list{display:grid;gap:10px}.menu-link{display:flex;align-items:center;gap:12px;text-decoration:none;color:var(--text);border:1px solid var(--border);border-radius:16px;padding:14px;background:linear-gradient(180deg,rgba(90,75,218,.06),transparent);text-align:left;width:100%}

    main{max-width:980px;margin:auto;padding:22px 16px 42px}.hero{border:1px solid var(--border);background:linear-gradient(135deg,rgba(90,75,218,.12),rgba(20,184,166,.10));border-radius:28px;padding:18px;margin-bottom:18px;display:flex;align-items:center;gap:14px;box-shadow:0 12px 30px rgba(15,23,42,.07)}.hero-icon{width:52px;height:52px;border-radius:18px;background:linear-gradient(135deg,var(--primary),#14b8a6);color:#fff;display:grid;place-items:center;font-size:24px;flex:none}.hero h2{font-size:20px;line-height:1.25}.hero p{color:var(--muted);font-size:14px;margin-top:4px;line-height:1.45}.meta-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}.pill{border:1px solid var(--border);background:var(--card);border-radius:999px;padding:7px 10px;font-size:12px;font-weight:800;color:var(--muted)}

    .toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;gap:10px}.count-text{color:var(--muted);font-size:14px;font-weight:700}.list{display:grid;gap:14px}.topic-card{background:var(--card);border:1px solid var(--border);border-radius:22px;padding:16px;box-shadow:0 10px 26px rgba(15,23,42,.07);display:flex;align-items:center;gap:14px;cursor:pointer;transition:.22s;width:100%;text-align:left;color:var(--text)}.topic-card:hover{transform:translateY(-2px);box-shadow:var(--shadow);border-color:rgba(90,75,218,.45)}.topic-strip{width:7px;height:48px;border-radius:999px;background:linear-gradient(180deg,var(--primary),#14b8a6);flex:none}.topic-main{min-width:0;flex:1}.topic-title{font-size:17px;font-weight:950;line-height:1.3;word-break:break-word}.stats{display:flex;align-items:center;gap:9px;flex-wrap:wrap;color:var(--muted);font-size:13px;font-weight:750;margin-top:8px}.sep{color:#cbd5e1}.arrow{width:36px;height:36px;border-radius:14px;display:grid;place-items:center;background:rgba(90,75,218,.10);color:var(--primary);font-weight:950;flex:none}.all-card{border-color:rgba(90,75,218,.45);background:linear-gradient(135deg,rgba(90,75,218,.10),rgba(20,184,166,.08)),var(--card)}

    .skeleton-card{background:var(--card);border:1px solid var(--border);border-radius:22px;padding:16px;box-shadow:0 10px 26px rgba(15,23,42,.07)}.skeleton{background:linear-gradient(90deg,#e5e7eb 25%,#f3f4f6 50%,#e5e7eb 75%);background-size:220% 100%;animation:shine 1.1s infinite linear;border-radius:12px}body.dark .skeleton{background:linear-gradient(90deg,#1f2437 25%,#2e344b 50%,#1f2437 75%);background-size:220% 100%}@keyframes shine{to{background-position:-220% 0}}.sk-title{height:22px;width:70%;margin-bottom:12px}.sk-row{height:14px;width:45%}

    .empty,.error{padding:32px 20px;text-align:center;border:1px dashed var(--border);border-radius:24px;background:var(--card);color:var(--muted)}.empty h3,.error h3{color:var(--text);margin-bottom:8px}.error{border-color:#fecaca;background:#fff1f2;color:#be123c}body.dark .error{background:rgba(127,29,29,.18);border-color:rgba(248,113,113,.28);color:#fca5a5}
    .toast-box{position:fixed;top:82px;right:16px;z-index:100;display:grid;gap:10px}.toast{min-width:260px;max-width:340px;background:var(--card);border:1px solid var(--border);border-left:5px solid var(--primary);box-shadow:var(--shadow);border-radius:16px;padding:14px;animation:toastIn .25s ease}.toast.danger{border-left-color:var(--danger)}.toast h4{font-size:14px}.toast p{font-size:13px;color:var(--muted);margin-top:3px}@keyframes toastIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
    .footer-note{text-align:center;margin-top:28px;color:var(--muted);font-size:13px}
    @media(max-width:620px){.brand-text h1{font-size:16px}.brand-text p{max-width:180px}.hero{align-items:flex-start}.hero h2{font-size:18px}.topic-card{padding:14px}.topic-title{font-size:16px}.stats{font-size:12px}.arrow{display:none}.hide-sm{display:none}}
  </style>
</head>
<body>
  <header class="app-header">
    <div class="nav">
      <div class="left-nav">
        <button class="icon-btn" id="backBtn" title="Back">‹</button>
        <div class="logo">AKP</div>
        <div class="brand-text">
          <h1 id="pageTitle">Subject</h1>
          <p id="pageSubTitle">PW Topics</p>
        </div>
      </div>
      <div class="header-actions">
        <button class="icon-btn" id="searchToggle" title="Search">🔍</button>
        <button class="icon-btn" id="themeToggle" title="Theme">🌙</button>
        <button class="icon-btn" id="menuToggle" title="Menu">☰</button>
      </div>
    </div>
    <div class="search-wrap hidden" id="searchWrap">
      <div class="search-box">
        <span class="search-icon">🔎</span>
        <input id="searchInput" type="search" placeholder="Search topics..." autocomplete="off" />
        <button class="clear-search hidden" id="clearSearch" title="Clear">×</button>
      </div>
    </div>
  </header>

  <aside class="side-menu" id="sideMenu">
    <div class="menu-overlay" data-close-menu></div>
    <div class="menu-panel">
      <div class="menu-head">
        <h2>Menu</h2>
        <button class="icon-btn" data-close-menu>×</button>
      </div>
      <div class="menu-list">
        <a class="menu-link" href="/">🏠 Home</a>
        <a class="menu-link" href="/study-v2/batches">📚 Batches</a>
        <button class="menu-link" id="reloadBtn">🔄 Reload Topics</button>
        <a class="menu-link" href="https://t.me/NT_PW_2027_free_lectures" target="_blank" rel="noopener noreferrer">📢 Telegram Main</a>
      </div>
    </div>
  </aside>

  <main>
    <section class="hero">
      <div class="hero-icon">📖</div>
      <div>
        <h2 id="heroTitle">Loading subject topics...</h2>
        <p>Choose a topic to open videos, exercises and notes.</p>
        <div class="meta-row">
          <span class="pill" id="batchPill">BatchId: --</span>
          <span class="pill" id="subjectPill">SubjectId: --</span>
        </div>
      </div>
    </section>

    <section class="toolbar">
      <p class="count-text" id="countText">Loading...</p>
      <button class="btn" id="clearSearchToolbar">Clear Search</button>
    </section>

    <section id="statusArea"></section>
    <section class="list" id="topicList"></section>
    <p class="footer-note">All rights reserved by LearnByAKP</p>
  </main>

  <div class="toast-box" id="toastBox"></div>

  <script src="./apv/pwcont.js" ></script>
</body>
</html>
