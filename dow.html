
<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="robots" content="noindex, follow">
  <meta charset="UTF-8" />
  <title>Mtaiirus — Video Info & Download</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#D4540E">
  <link rel="icon" href="https://i.ibb.co/G3TLgSgJ/pngtree-mv-vm-letter-vector-logo-image-332121.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: dark;
      --bg: #1A1814;
      --card: #1A1814;
      --border: rgba(240,168,122,.35);
      --accent: #D4540E;
      --accent-soft: rgba(212,84,14,.16);
      --text: #F5F2EB;
      --muted: #B0ADA7;
      --danger: #F0A87A;
      --font-heading: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-body);
      background: radial-gradient(circle at top, #25221E 0, #1A1814 55%, #0D0B0A 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      -webkit-tap-highlight-color: transparent;
    }

    .card {
      width: 100%;
      max-width: 540px;
      background: var(--card);
      border-radius: 18px;
      padding: 18px 16px 16px;
      border: 1px solid var(--border);
      box-shadow: 0 18px 42px rgba(0,0,0,.9);
    }

    h1 {
      font-family: var(--font-heading);
      font-size: 17px;
      margin-bottom: 4px;
      letter-spacing: -.3px;
    }

    .subtitle {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 10px;
    }

    label {
      font-size: 11px;
      color: var(--muted);
      display: block;
      margin-bottom: 3px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    input[type="text"],
    input[type="number"] {
      width: 100%;
      padding: 9px 10px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #0D0B0A;
      color: var(--text);
      font-size: 13px;
      outline: none;
      margin-bottom: 8px;
      font-family: var(--font-body);
      transition: border-color .12s ease, box-shadow .12s ease;
    }

    input::placeholder { color: rgba(176,173,167,.6); }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(212,84,14,.2);
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px 12px;
      margin: 8px 0 4px;
    }

    .row {
      padding: 7px 9px;
      border-radius: 9px;
      background: radial-gradient(circle at top left, rgba(240,168,122,.1), rgba(26,24,20,.9));
      border: 1px solid rgba(240,168,122,.15);
      font-size: 11px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 6px;
    }

    .row-label { color: var(--muted); white-space: nowrap; }

    .value {
      color: var(--text);
      font-weight: 500;
      font-size: 11px;
      text-align: right;
    }

    .btn-row {
      margin-top: 8px;
      margin-bottom: 4px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    button {
      border: none;
      cursor: pointer;
      border-radius: 999px;
      padding: 7px 14px;
      font-size: 13px;
      font-family: var(--font-body);
      font-weight: 600;
    }

    .btn-primary {
      background: linear-gradient(135deg, #D4540E, #e8651f);
      color: #fff;
      box-shadow: 0 10px 25px rgba(212,84,14,.5), 0 0 0 1px rgba(212,84,14,.5);
      transition: transform .12s ease, box-shadow .12s ease, opacity .12s ease;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 32px rgba(212,84,14,.7), 0 0 0 1px rgba(212,84,14,.6);
    }

    .btn-primary:active {
      transform: translateY(0);
      box-shadow: 0 8px 18px rgba(212,84,14,.6), 0 0 0 1px rgba(212,84,14,.6);
    }

    .btn-primary[disabled] { opacity: .7; cursor: wait; }

    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { border-color: var(--accent); color: var(--text); }

    .status {
      font-size: 11px;
      color: var(--danger);
      min-height: 14px;
      margin-top: 4px;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(26,24,20,.88);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      backdrop-filter: blur(8px);
    }

    .modal-overlay.active { display: flex; }

    .modal {
      width: 100%;
      max-width: 420px;
      background: radial-gradient(circle at top, #25221E, #1A1814);
      border-radius: 18px;
      border: 1px solid rgba(240,168,122,.5);
      padding: 16px 16px 14px;
      box-shadow: 0 24px 60px rgba(0,0,0,.9), 0 0 0 1px rgba(26,24,20,.8);
    }

    .modal-title {
      font-family: var(--font-heading);
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .modal-title::before { content: "⬇"; font-size: 16px; }

    .modal-body {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 10px;
      min-height: 18px;
    }

    .modal-error { color: var(--danger); }

    .progress-bar-wrap {
      width: 100%;
      height: 10px;
      border-radius: 999px;
      background: rgba(26,24,20,.9);
      border: 1px solid rgba(240,168,122,.3);
      overflow: hidden;
      margin-bottom: 6px;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #D4540E, #F0A87A);
      box-shadow: 0 0 18px rgba(212,84,14,.6);
      transition: width .25s ease;
    }

    .progress-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 4px;
    }

    .btn-cancel {
      padding: 6px 12px;
      border-radius: 999px;
      border: 1px solid rgba(240,168,122,.4);
      background: rgba(26,24,20,.9);
      color: var(--muted);
      font-size: 11px;
      cursor: pointer;
      font-family: var(--font-body);
    }

    .btn-ok {
      padding: 6px 14px;
      border-radius: 999px;
      border: none;
      background: linear-gradient(135deg, #D4540E, #e8651f);
      color: #fff;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      font-family: var(--font-body);
    }

    code {
      font-size: 11px;
      background: rgba(26,24,20,.9);
      padding: 1px 4px;
      border-radius: 4px;
      border: 1px solid rgba(240,168,122,.5);
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Video helper (title + quality + size)</h1>
    <p class="subtitle">
      URL se <code>file_url</code> aur <code>title</code> param auto fill ho jayenge, warna khud bhar sakte ho.
    </p>

    <label for="titleInput">Video title</label>
    <input id="titleInput" type="text" placeholder="Example: Real Numbers Lecture 1" />

    <label for="urlInput">Video URL (.m3u8 / .mp4 / .webm)</label>
    <input id="urlInput" type="text" placeholder="https://example.com/video.m3u8" />

    <div class="info-grid">
      <div class="row"><span class="row-label">Type</span><span class="value" id="typeInfo">-</span></div>
      <div class="row"><span class="row-label">Duration</span><span class="value" id="durationInfo">-</span></div>
    </div>

    <label for="qualityInput">Quality (e.g. 420p, 513p, 720p, 4k)</label>
    <input id="qualityInput" type="text" placeholder="420p, 513p, 720p, 1080p, 4k ..." />

    <div class="row" style="margin-top:4px;">
      <span class="row-label">Estimated size</span>
      <span class="value" id="sizeInfo">-</span>
    </div>

    <div class="btn-row">
      <button class="btn-primary" id="checkBtn">Check info</button>
      <button class="btn-ghost" id="downloadBtn">Download</button>
    </div>

    <div class="status" id="status"></div>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-title" id="modalTitle">Download</div>
      <div class="modal-body" id="modalBody"></div>

      <div class="progress-bar-wrap" id="progressWrap" style="display:none;">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <div class="progress-info" id="progressInfo" style="display:none;">
        <span id="progressText">0%</span>
        <span id="progressNote">Downloading segments...</span>
      </div>

      <div class="modal-actions">
        <button class="btn-cancel" id="cancelBtn" style="display:none;">Cancel</button>
        <button class="btn-ok" id="okBtn">OK</button>
      </div>
    </div>
  </div>

  <script>

</html>
