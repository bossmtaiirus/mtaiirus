

<!DOCTYPE html>
<html lang="en">
<head><meta name="robots" content="noindex, follow">
  <meta charset="UTF-8" />
  <title>Video Info + Size + Download Helper</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #020617;
      --card: #020617;
      --border: rgba(148, 163, 184, 0.45);
      --accent: #22c55e;
      --accent-soft: rgba(34, 197, 94, 0.16);
      --text: #e5e7eb;
      --muted: #9ca3af;
      --danger: #f97373;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #1e293b 0, #020617 55%, #000 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .card {
      width: 100%;
      max-width: 540px;
      background: var(--card);
      border-radius: 18px;
      padding: 18px 16px 16px;
      border: 1px solid var(--border);
      box-shadow: 0 18px 42px rgba(0, 0, 0, 0.9);
    }

    h1 {
      font-size: 17px;
      margin-bottom: 4px;
      letter-spacing: 0.01em;
    }

    .subtitle {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 10px;
    }

    label {
      font-size: 12px;
      color: var(--muted);
      display: block;
      margin-bottom: 3px;
    }

    input[type="text"],
    input[type="number"] {
      width: 100%;
      padding: 8px 9px;
      border-radius: 9px;
      border: 1px solid var(--border);
      background: #020617;
      color: #e5e7eb;
      font-size: 13px;
      outline: none;
      margin-bottom: 8px;
      transition: border-color 0.12s ease, box-shadow 0.12s ease, background 0.12s ease;
    }

    input::placeholder { color: rgba(148, 163, 184, 0.7); }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px rgba(34, 197, 94, 0.45);
      background: #020617;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px 12px;
      margin: 8px 0 4px;
    }

    .row {
      padding: 7px 9px;
      border-radius: 9px;
      background: radial-gradient(circle at top left, rgba(148, 163, 184, 0.15), rgba(15, 23, 42, 0.9));
      border: 1px solid rgba(148, 163, 184, 0.2);
      font-size: 11px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 6px;
    }

    .row-label {
      color: var(--muted);
      white-space: nowrap;
    }

    .value {
      color: #e5e7eb;
      font-weight: 500;
      font-size: 11px;
      text-align: right;
    }

    .btn-row {
      margin-top: 8px;
      margin-bottom: 4px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    button {
      border: none;
      cursor: pointer;
      border-radius: 999px;
      padding: 7px 14px;
      font-size: 13px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: #020617;
      font-weight: 600;
      box-shadow:
        0 10px 25px rgba(22, 163, 74, 0.6),
        0 0 0 1px rgba(21, 128, 61, 0.7);
      transition: transform 0.12s ease, box-shadow 0.12s ease, opacity 0.12s ease;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow:
        0 14px 32px rgba(22, 163, 74, 0.85),
        0 0 0 1px rgba(22, 163, 74, 0.8);
    }

    .btn-primary:active {
      transform: translateY(0);
      box-shadow:
        0 8px 18px rgba(22, 163, 74, 0.75),
        0 0 0 1px rgba(22, 163, 74, 0.8);
    }

    .btn-primary[disabled] {
      opacity: 0.7;
      cursor: wait;
    }

    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .status {
      font-size: 11px;
      color: var(--danger);
      min-height: 14px;
      margin-top: 4px;
    }

    /* Popup / modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.88);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      backdrop-filter: blur(8px);
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal {
      width: 100%;
      max-width: 420px;
      background: radial-gradient(circle at top, #111827, #020617);
      border-radius: 18px;
      border: 1px solid rgba(148, 163, 184, 0.6);
      padding: 16px 16px 14px;
      box-shadow:
        0 24px 60px rgba(0, 0, 0, 0.9),
        0 0 0 1px rgba(15, 23, 42, 0.8);
    }

    .modal-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .modal-title::before {
      content: "⬇";
      font-size: 16px;
    }

    .modal-body {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 10px;
      min-height: 18px;
    }

    .modal-error {
      color: var(--danger);
    }

    .progress-bar-wrap {
      width: 100%;
      height: 10px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid rgba(148, 163, 184, 0.45);
      overflow: hidden;
      margin-bottom: 6px;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #22c55e, #16a34a);
      box-shadow: 0 0 18px rgba(34, 197, 94, 0.7);
      transition: width 0.25s ease;
    }

    .progress-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 4px;
    }

    .btn-cancel {
      padding: 6px 12px;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.6);
      background: rgba(15, 23, 42, 0.9);
      color: var(--muted);
      font-size: 11px;
      cursor: pointer;
    }

    .btn-ok {
      padding: 6px 14px;
      border-radius: 999px;
      border: none;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: #020617;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
    }

    code {
      font-size: 11px;
      background: rgba(15, 23, 42, 0.9);
      padding: 1px 4px;
      border-radius: 4px;
      border: 1px solid rgba(30, 64, 175, 0.7);
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Video helper (title + quality + size)</h1>
    <p class="subtitle">
      URL se <code>file_url</code> aur <code>title</code> param auto fill ho jayenge, warna khud bhar sakte ho.
    </p>

    <label for="titleInput">Video title</label>
    <input id="titleInput" type="text" placeholder="Example: Real Numbers Lecture 1" />

    <label for="urlInput">Video URL (.m3u8 / .mp4 / .webm)</label>
    <input id="urlInput" type="text" placeholder="https://example.com/video.m3u8" />

    <div class="info-grid">
      <div class="row">
        <span class="row-label">Type</span>
        <span class="value" id="typeInfo">-</span>
      </div>
      <div class="row">
        <span class="row-label">Duration</span>
        <span class="value" id="durationInfo">-</span>
      </div>
    </div>

    <label for="qualityInput">Quality (e.g. 420p, 513p, 720p, 4k)</label>
    <input id="qualityInput" type="text" placeholder="420p, 513p, 720p, 1080p, 4k ..." />

    <div class="row" style="margin-top:4px;">
      <span class="row-label">Estimated size</span>
      <span class="value" id="sizeInfo">-</span>
    </div>

    <div class="btn-row">
      <button class="btn-primary" id="checkBtn">Check info</button>
      <button class="btn-ghost" id="downloadBtn">Download</button>
    </div>

    <div class="status" id="status"></div>
  </div>

  <!-- Popup modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-title" id="modalTitle">Download</div>
      <div class="modal-body" id="modalBody"></div>

      <div class="progress-bar-wrap" id="progressWrap" style="display:none;">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <div class="progress-info" id="progressInfo" style="display:none;">
        <span id="progressText">0%</span>
        <span id="progressNote">Downloading segments...</span>
      </div>

      <div class="modal-actions">
        <button class="btn-cancel" id="cancelBtn" style="display:none;">Cancel</button>
        <button class="btn-ok" id="okBtn">OK</button>
      </div>
    </div>
  </div>

  <script src="./html-js/dow.js"></script>
</body>
</html>
