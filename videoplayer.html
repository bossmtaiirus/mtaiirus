<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>LearnByAKP | player</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="stylesheet" href="videocss.css" />
</head>
<body>
  <!-- Fullscreen direct root (sirf ye hi fullscreen hoga) -->
  <div class="vp-root" id="vpRoot">
    <div class="vp-video-shell paused" id="vpVideoShell">
      <video id="video" class="vp-video"></video>

      <!-- Spinner with logo and % -->
      <div id="videoLoader">
        <div class="spinner">
          <img src="lo.png" alt="Logo" />
          <div class="spinner-ring"></div>
        </div>
        <div class="load-text">Loading... 0%</div>
      </div>

      <!-- Center play -->
      <button class="vp-center-play" id="centerPlayBtn" aria-label="Play / Pause">
        ▶
      </button>

      <!-- Badges -->
      <div class="vp-badges">
        <span class="vp-badge" id="vpLiveBadge">LIVE</span>
        <span class="vp-badge ghost" id="vpVodBadge">RECORDED</span>
      </div>

      <!-- Glass controls -->
      <div class="vp-controls" id="vpControls">
        <div class="vp-progress-wrap">
          <div class="vp-time">
            <span id="vpCurrentTime">00:00:00</span>
            <span>/</span>
            <span id="vpDuration">00:00:00</span>
          </div>
          <div class="vp-progress-bar" id="vpProgressBar">
            <div class="vp-progress-buffer" id="vpBuffer"></div>
            <div class="vp-progress-fill" id="vpProgressFill"></div>
            <div class="vp-progress-tooltip" id="vpProgressTooltip">00:00</div>
            <div class="vp-progress-handle" id="vpProgressHandle"></div>
          </div>
        </div>

        <div class="vp-controls-row">
          <div class="vp-controls-left">
            <button class="vp-ctrl-btn" id="backwardBtn" aria-label="Seek -10s">⏪</button>
            <button class="vp-ctrl-btn" id="playPauseBtn" aria-label="Play / Pause">▶</button>
            <button class="vp-ctrl-btn" id="forwardBtn" aria-label="Seek +10s">⏩</button>

            <button class="vp-ctrl-btn" id="muteBtn" aria-label="Mute / Unmute">🔊</button>
            <input
              type="range"
              id="volumeSlider"
              min="0"
              max="1"
              step="0.01"
              value="1"
            />

            <!-- Screenshot -->
            <button class="vp-ctrl-btn" id="screenshotBtn" aria-label="Screenshot">
              📸
            </button>
          </div>

          <div class="vp-controls-right">
            <!-- More (⋮) menu -->
             <button class="vp-ctrl-btn" id="redirectBtn" aria-label="Download video">
  <img src="dow.png" alt="Download" class="download-icon" />
</button>
            <div class="vp-more-wrap">


              <button id="moreBtn" class="vp-more-btn" aria-label="More options">
                ⚙️
              </button>
            
              <div id="moreMenu" class="vp-more-menu">
                <!-- Speed -->
                <div class="vp-more-item">
                  <span>Speed</span>
                  <select id="vpSpeedSelect" class="vp-speed-select">
                    <option value="0.5">0.5x</option>
                    <option value="0.75">0.75x</option>
                    <option value="1" selected>1.0x</option>
                    <option value="1.25">1.25x</option>
                    <option value="1.5">1.5x</option>
                    <option value="1.75">1.75x</option>
                    <option value="2">2.0x</option>
                    <option value="2.5">2.5x</option>
                    <option value="3">3.0x</option>
                    <option value="3.5">3.5x</option>
                    <option value="4">4.0x</option>
                    <option value="4.5">4.5x</option>
                    <option value="5">5x</option>
                    <option value="6">6x</option>
                    <option value="10">10x</option>
                  </select>
                </div>

                <!-- Quality -->
   <div class="vp-more-item" id="moreQualityRow">
  <span>Quality</span>

  <select id="qualitySelect" class="vp-quality-select">
    <option value="auto" selected>Auto</option>
    <option value="1080">1080p</option>
    <option value="720">720p</option>
    <option value="480">480p</option>
    <option value="420">420p</option>
    <option value="360">360p</option>
    <option value="240">240p</option>
  
  </select>
</div>

             
 <div class="vp-more-item" >
  <span>Picture in Picture</span>
                <!-- Picture in Picture -->
                <button class="vp-quality-select2" id="pipBtn">
                  <span>  📺</span>
                </button>
</div>
                <!-- Download -->
                
              </div>
            </div>

            <!-- Fullscreen button (menu ke bahar hi rahe) -->
            <button class="vp-ctrl-btn" id="fullscreenBtn" aria-label="Fullscreen">⛶</button>
          </div>
        </div>
      </div>
    </div>

   

    <div class="vp-card" id="playerContainer">
      <header class="vp-header">
        <div class="vp-title-group">

          <span class="vp-pill">𝘓𝙚𝙖𝙧𝙣𝙗𝙮𝙖𝙠𝙥</span>
          <h1>Lecture</h1>
          <h1 id="videoTitleTxt" class="vp-title">Loading...</h1>
          <p class="vp-subtitle" id="vpMeta">
            
          </p>
          
        </div>
      </header>
    </div>

    <!-- Toast -->
    <div class="vp-toast" id="vpToast"></div>
  </div>

  <!-- Download redirect script -->


  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script src="../x/video.js"></script>
</body>
</html>
