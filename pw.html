<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="robots" content="noindex, follow">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Get Access Key</title>
  <meta name="description" content="Generate a temporary access key for Learnbyakp.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./html-js/next-static.css">
  <script defer src="./apv/delta-auth.js"></script>

  <style>
    /* Transparent Background */
    body, html, .page, .page-muted, .center-shell {
      background: transparent !important;
      height: 100vh;
      margin: 0;
      padding: 0;
    }
    
    /* Faltu elements hide kiye (Topbar, p tags) */
    .topbar, .panel p, .hint {
      display: none !important;
    }

    .panel {
      background: transparent !important;
      border: none !important;
      box-shadow: none !important;
      text-align: center;
      padding: 0 !important;
      margin: 0 !important;
    }

    /* JituVault - White color taki black layout pe dikhe */
    .panel h2 {
      font-size: 3rem !important;
      font-weight: 900 !important;
      color: #000000 !important; 
      margin-bottom: 25px !important;
      letter-spacing: -1px !important;
    }

    /* Open Now Button - White background, black text */
    #openGenerateDialog {
      background-color: #ffffff !important;
      color: #ffffff !important;
      border: none !important;
      padding: 14px 28px !important;
      font-size: 1.1rem !important;
      font-weight: 800 !important;
      border-radius: 12px !important;
      cursor: pointer !important;
      box-shadow: 0 4px 15px rgba(255,255,255,0.2) !important;
      animation: pulse-anim 1.5s infinite ease-in-out !important;
      width: auto !important;
      display: inline-block !important;
    }

    @keyframes pulse-anim {
      0% { transform: scale(1); }
      50% { transform: scale(1.06); }
      100% { transform: scale(1); }
    }

    /* Modal ko completely screen se hide kar diya */
    #generateDialog {
      opacity: 0 !important;
      visibility: hidden !important;
      position: absolute !important;
      pointer-events: none !important;
      z-index: -9999 !important;
    }
  </style>
</head>
<body>
  <div class="page page-muted">
    <header class="topbar topbar-dark">
      <a class="icon-button" href="./pw.html" aria-label="Back">
        <span aria-hidden="true">&#000000;</span>
      </a>
      <h1>Get Access Key</h1>
      <span class="topbar-spacer"></span>
    </header>

    <main class="center-shell">
      <section class="panel access-panel">
        <h2>JituVault</h2>
        <p>To access all batches and content, you need to generate a temporary access key.</p>
        <button class="btn btn-primary btn-block" id="openGenerateDialog" type="button">🔥 Open Now 🔥</button>
        <p class="hint">Your key will be valid for 24 hours. After that, you'll need to generate a new one.</p>
      </section>
    </main>
  </div>

  <div class="modal" id="generateDialog" hidden>
    <div class="modal-backdrop" data-close-dialog></div>
    <section class="modal-card" role="dialog" aria-modal="true" aria-labelledby="generateTitle">
      <h2 id="generateTitle">Generate Your Key</h2>
      <p>Click the button below to proceed.</p>
      <div class="modal-actions">
        <button class="btn btn-outline" type="button" data-close-dialog>Cancel</button>
        <button class="btn btn-primary" id="generateKey" type="button">Generate Key</button>
      </div>
    </section>
  </div>

  <script>
    document.getElementById('openGenerateDialog').addEventListener('click', function() {
      setTimeout(function() {
        var hiddenGenBtn = document.getElementById('generateKey');
        if(hiddenGenBtn) {
          hiddenGenBtn.click();
        }
      }, 50);
    });
  </script>
</body>
</html>
